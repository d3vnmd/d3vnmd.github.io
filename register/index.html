<!DOCTYPE html>
<html lang="mn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Нэвтрэх | devnmd</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body {
            background-color: #030307;
            color: #ffffff;
            font-family: 'Segoe UI', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }
        .card {
            background: rgba(10, 10, 18, 0.7);
            border: 1px solid rgba(0, 240, 255, 0.2);
            border-radius: 20px;
            padding: 40px;
            text-align: center;
            width: 100%;
            max-width: 380px;
            box-shadow: 0 0 30px rgba(0, 240, 255, 0.15);
        }
        .brand-logo {
            font-size: 36px;
            font-weight: 900;
            background: linear-gradient(45deg, #00f0ff, #bd00ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 10px;
        }
        p { color: #8a8a9e; font-size: 14px; margin-bottom: 30px; }
        .discord-btn {
            background: #5865F2; color: #ffffff; border: none;
            padding: 14px 20px; border-radius: 12px; font-size: 16px;
            font-weight: bold; cursor: pointer; width: 100%;
            display: flex; align-items: center; justify-content: center; gap: 12px;
            transition: 0.2s;
        }
        .discord-btn:hover { background: #4752C4; transform: translateY(-2px); }
