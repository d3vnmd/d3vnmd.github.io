<!DOCTYPE html>
<html lang="mn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Нэвтрэх | devnmd</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body {
            background-color: #020205; color: #ffffff;
            font-family: 'Segoe UI', sans-serif;
            display: flex; justify-content: center; align-items: center;
            min-height: 100vh; margin: 0;
            overflow: hidden;
        }
        /* Neon background effects */
        body::before {
            content: ''; position: absolute; width: 400px; height: 400px;
            background: radial-gradient(circle, rgba(189,0,255,0.15) 0%, rgba(0,0,0,0) 70%);
            top: -100px; left: -100px; z-index: -1;
        }
        body::after {
            content: ''; position: absolute; width: 450px; height: 450px;
            background: radial-gradient(circle, rgba(0,240,255,0.12) 0%, rgba(0,0,0,0) 70%);
            bottom: -150px; right: -150px; z-index: -1;
        }
        .card {
            background: rgba(10, 10, 18, 0.75);
            border: 1px solid rgba(189, 0, 255, 0.25);
            border-radius: 24px; padding: 45px 35px;
            text-align: center; width: 100%; max-width: 390px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.5), 0 0 30px rgba(189, 0, 255, 0.1);
            backdrop-filter: blur(15px);
            animation: cardSlide 0.5s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }
        @keyframes cardSlide {
            0% { opacity: 0; transform: translateY(20px); }
            100% { opacity: 1; transform: translateY(0); }
        }
        .brand-logo {
            font-size: 38px; font-weight: 900;
            background: linear-gradient(45deg, #00f0ff, #bd00ff);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            margin-bottom: 12px;
            letter-spacing: -1px;
        }
        p { color: #8a8a9e; font-size: 14px; margin-bottom: 35px; line-height: 1.6; }
        .discord-btn {
            background: #5865F2; color: #ffffff; border: none;
            padding: 16px 24px; border-radius: 14px; font-size: 16px;
            font-weight: bold; cursor: pointer; width: 100%;
            display: flex; align-items: center; justify-content: center; gap: 12px;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(88, 101, 242, 0.35);
        }
        .discord-btn:hover { 
            background: #4752C4; 
            transform: translateY(-2px); 
            box-shadow: 0 6px 20px rgba(88, 101, 242, 0.5);
        }
        .discord-btn svg { width: 24px; height: 24px; fill: white; }
    </style>
</head>
<body>

    <div class="card">
        <div class="brand-logo">devnmd</div>
        <p>Discord хаягаараа ганцхан даралтаар нэвтэрч, өөрийн нэрийн хуудсаа үнэгүй үүсгээрэй.</p>
        <button class="discord-btn" onclick="signInWithDiscord()">
            <svg viewBox="0 0 127.14 96.36">
                <path d="M107.7,8.07A105.15,105.15,0,0,0,77.26,0a77.19,77.19,0,0,0-3.3,6.83A96.67,96.67,0,0,0,53.22,6.83,77.19,77.19,0,0,0,49.88,0,105.15,105.15,0,0,0,19.44,8.07C3.66,31.58-1.86,54.65,1,77.53A105.73,105.73,0,0,0,32,96.36a77.7,77.7,0,0,0,6.63-10.85,68.43,68.43,0,0,1-10.5-5c.9-.65,1.76-1.34,2.58-2a75.58,75.58,0,0,0,72.9,0c.82.71,1.68,1.4,2.58,2a68.43,68.43,0,0,1-10.5,5,77.7,77.7,0,0,0,6.63,10.85,105.73,105.73,0,0,0,31.06-18.83C129.87,49.8,123.37,27,107.7,8.07ZM42.45,65.69C36.18,65.69,31,60,31,53S36.18,40.36,42.45,40.36,53.83,46,53.83,53,48.72,65.69,42.45,65.69Zm42.24,0C78.41,65.69,73.24,60,73.24,53S78.41,40.36,84.69,40.36,96.07,46,96.07,53,91,65.69,84.69,65.69Z"/>
            </svg>
            Discord-оор нэвтрэх
        </button>
    </div>

    <script>
        const SUPABASE_URL = "https://jrzgxrptvirolfqhisqp.supabase.co";
        const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Impyemd4cnB0dmlyb2xmcWhpc3FwIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODQxMjEwODEsImV4cCI6MjA5OTY5NzA4MX0.DSFIaJ8PnmXu3PA4Y9tBT5ibGIBtA5w6f7iHmCrf86M";
        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        async function checkSession() {
            const { data: { session } } = await supabaseClient.auth.getSession();
            if (session) {
                const { data: user } = await supabaseClient
                    .from('profiles')
                    .select('username')
                    .eq('id', session.user.id)
                    .maybeSingle();

                if (user) {
                    window.location.href = `/${user.username}`;
                } else {
                    window.location.href = '/username';
                }
            }
        }

        checkSession();

        async function signInWithDiscord() {
            const urlParams = new URLSearchParams(window.location.search);
            const claim = urlParams.get('claim');
            if (claim) {
                localStorage.setItem('claim_username', claim);
            }

            await supabaseClient.auth.signInWithOAuth({
                provider: 'discord',
                options: { redirectTo: window.location.origin + '/username' }
            });
        }
    </script>
</body>
</html>
