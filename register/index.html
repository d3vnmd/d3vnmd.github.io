<!DOCTYPE html>
<html lang="mn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Нэвтрэх / Бүртгүүлэх | devnmd</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body {
            background-color: #030206; color: #ffffff;
            font-family: 'Segoe UI', sans-serif;
            display: flex; justify-content: center; align-items: center;
            min-height: 100vh; margin: 0; overflow: hidden;
        }
        body::before {
            content: ''; position: absolute; width: 400px; height: 400px;
            background: radial-gradient(circle, rgba(0, 242, 254, 0.12) 0%, rgba(0,0,0,0) 70%);
            top: -100px; left: -100px; z-index: -1;
        }
        .card {
            background: rgba(8, 7, 13, 0.75);
            border: 1px solid rgba(0, 242, 254, 0.2);
            border-radius: 28px; padding: 45px 35px;
            text-align: center; width: 100%; max-width: 400px;
            box-shadow: 0 15px 45px rgba(0,0,0,0.6), 0 0 35px rgba(0, 242, 254, 0.15);
            backdrop-filter: blur(20px);
            animation: cardSlide 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }
        @keyframes cardSlide {
            0% { opacity: 0; transform: translateY(30px); }
            100% { opacity: 1; transform: translateY(0); }
        }
        .brand-logo {
            font-size: 38px; font-weight: 900;
            background: linear-gradient(45deg, #00f2fe, #9b51e0);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            margin-bottom: 25px;
        }
        .input-group { margin-bottom: 18px; text-align: left; }
        label { display: block; font-size: 11px; color: #8a8a9e; margin-bottom: 6px; font-weight: bold; text-transform: uppercase; }
        input {
            width: 100%; padding: 14px; background: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(255, 255, 255, 0.06); border-radius: 12px;
            color: white; box-sizing: border-box; font-size: 14px;
            transition: all 0.3s;
        }
        input:focus { outline: none; border-color: #00f2fe; background: rgba(0,242,254,0.02); }
        button {
            width: 100%; padding: 15px; background: linear-gradient(135deg, #00f2fe, #9b51e0); border: none;
            color: #000; font-weight: bold; border-radius: 12px;
            cursor: pointer; font-size: 16px; transition: all 0.3s;
            box-shadow: 0 4px 20px rgba(0, 242, 254, 0.3); margin-bottom: 15px;
        }
        button:hover { transform: translateY(-2px); box-shadow: 0 6px 25px rgba(0, 242, 254, 0.5); }
        .toggle-text { color: #8a8a9e; font-size: 13px; cursor: pointer; transition: color 0.2s; }
        .toggle-text:hover { color: #00f2fe; }
    </style>
</head>
<body>

    <div class="card">
        <div class="brand-logo">devnmd</div>
        
        <div id="auth-form">
            <h3 id="form-title" style="margin-top:0; margin-bottom:20px;">Нэвтрэх</h3>
            <div class="input-group">
                <label>Discord нэр эсвэл ID</label>
                <input type="text" id="discord-id" placeholder="Жишээ: devnmd_admin" required>
            </div>
            <div class="input-group">
                <label>Нууц үг</label>
                <input type="password" id="password" placeholder="••••••••" required>
            </div>
            <button onclick="handleAuth()" id="submit-btn">Одоо нэвтрэх</button>
            <span class="toggle-text" onclick="toggleForm()" id="form-toggle">Шинэ хаяг нээх үү? Бүртгүүлэх</span>
        </div>
    </div>

    <script>
        const SUPABASE_URL = "https://jrzgxrptvirolfqhisqp.supabase.co";
        const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Impyemd4cnB0dmlyb2xmcWhpc3FwIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODQxMjEwODEsImV4cCI6MjA5OTY5NzA4MX0.DSFIaJ8PnmXu3PA4Y9tBT5ibGIBtA5w6f7iHmCrf86M";
        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        let isLogin = true;

        function toggleForm() {
            isLogin = !isLogin;
            document.getElementById('form-title').innerText = isLogin ? "Нэвтрэх" : "Бүртгүүлэх";
            document.getElementById('submit-btn').innerText = isLogin ? "Одоо нэвтрэх" : "Бүртгэл үүсгэх";
            document.getElementById('form-toggle').innerText = isLogin ? "Шинэ хаяг нээх үү? Бүртгүүлэх" : "Аль хэдийн хаягтай юу? Нэвтрэх";
        }

        async function handleAuth() {
            const discordId = document.getElementById('discord-id').value.trim().toLowerCase();
            const password = document.getElementById('password').value.trim();

            if (!discordId || password.length < 6) {
                alert("Discord ID эсвэл Нууц үг хамгийн багадаа 6 тэмдэгт байх шаардлагатай.");
                return;
            }

            // Найдвартай байх үүднээс Supabase Auth-ийн нууцлал бүхий локал имэйл систем рүү чиглүүлнэ[cite: 5].
            const simulatedEmail = `${discordId}@devnmd.local`;

            if (isLogin) {
                const { error } = await supabaseClient.auth.signInWithPassword({
                    email: simulatedEmail,
                    password: password
                });
                if (error) {
                    alert("Алдаа: Хэрэглэгчийн нэр эсвэл нууц үг буруу байна!");
                } else {
                    window.location.href = '/settings';
                }
            } else {
                const { data, error } = await supabaseClient.auth.signUp({
                    email: simulatedEmail,
                    password: password
                });
                if (error) {
                    alert("Алдаа: Энэ нэрээр аль хэдийн бүртгэл үүссэн байна!");
                } else {
                    alert("Бүртгэл амжилттай үүсгэгдлээ!");
                    window.location.href = '/username';
                }
            }
        }
    </script>
</body>
</html>
