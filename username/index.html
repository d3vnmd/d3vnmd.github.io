<!DOCTYPE html>
<html lang="mn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Нэр сонгох | devnmd</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body {
            background-color: #030206; color: #fff;
            font-family: 'Segoe UI', sans-serif;
            display: flex; justify-content: center; align-items: center;
            min-height: 100vh; margin: 0;
            overflow: hidden;
        }
        body::before {
            content: ''; position: absolute; width: 400px; height: 400px;
            background: radial-gradient(circle, rgba(0, 242, 254, 0.12) 0%, rgba(0,0,0,0) 70%);
            top: -100px; left: -100px; z-index: -1;
        }
        .card {
            background: rgba(8, 7, 13, 0.75);
            border: 1px solid rgba(0, 242, 254, 0.2);
            border-radius: 24px; padding: 40px;
            width: 100%; max-width: 400px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.5), 0 0 30px rgba(0, 242, 254, 0.1);
            box-sizing: border-box; text-align: center;
            backdrop-filter: blur(15px);
            animation: cardSlide 0.5s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }
        @keyframes cardSlide {
            0% { opacity: 0; transform: translateY(20px); }
            100% { opacity: 1; transform: translateY(0); }
        }
        h2 { color: #00f2fe; margin-bottom: 12px; font-weight: 800; font-size: 26px; }
        p { color: #8a8a9e; font-size: 14px; margin-bottom: 30px; line-height: 1.6; }
        .group { margin-bottom: 22px; text-align: left; }
        label { display: block; font-size: 11px; color: #8a8a9e; margin-bottom: 8px; font-weight: bold; text-transform: uppercase; }
        input {
            width: 100%; padding: 14px; background: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(255, 255, 255, 0.06); border-radius: 12px;
            color: white; box-sizing: border-box; font-size: 14px;
            transition: all 0.3s;
        }
        input:focus { outline: none; border-color: #00f2fe; background: rgba(0,242,254,0.02); }
        button {
            width: 100%; padding: 16px; background: linear-gradient(135deg, #00f2fe, #9b51e0); border: none;
            color: #000; font-weight: bold; border-radius: 12px;
            cursor: pointer; font-size: 16px; transition: all 0.25s;
            box-shadow: 0 4px 15px rgba(0, 242, 254, 0.35);
        }
        button:hover { 
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(0, 242, 254, 0.5);
        }
        .status { color: #ff0055; font-size: 13px; margin-top: 18px; font-weight: bold; }
    </style>
</head>
<body>

    <div class="card" id="form-card" style="display: none;">
        <h2>Нэр сонгох</h2>
        <p>Та өөрийн давтагдашгүй хаягийг үүсгэнэ үү. Эхлээд заавал нэрээ сонгож идэвхжүүлэх шаардлагатай.</p>
        <div class="group">
            <label>Хэрэглэгчийн нэр (Username)</label>
            <input type="text" id="username" placeholder="Жишээ: devnmd" required>
        </div>
        <div class="group">
            <label>Дэлгэцийн нэр (Display Name)</label>
            <input type="text" id="name" placeholder="Таны нэр" required>
        </div>
        <button onclick="createProfile()">Хаяг үүсгэх</button>
        <div class="status" id="status-msg"></div>
    </div>

    <script>
        const SUPABASE_URL = "https://jrzgxrptvirolfqhisqp.supabase.co";
        const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Impyemd4cnB0dmlyb2xmcWhpc3FwIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODQxMjEwODEsImV4cCI6MjA5OTY5NzA4MX0.DSFIaJ8PnmXu3PA4Y9tBT5ibGIBtA5w6f7iHmCrf86M";
        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        let sessionUser = null;

        async function init() {
            const { data: { user } } = await supabaseClient.auth.getUser();
            if (!user) { window.location.href = '/register'; return; }
            sessionUser = user;

            const { data: profile } = await supabaseClient.from('profiles').select('username').eq('id', user.id).maybeSingle();

            if (profile) {
                window.location.href = '/settings';
            } else {
                document.getElementById('form-card').style.display = 'block';
                const claimed = localStorage.getItem('claim_username');
                if (claimed) {
                    document.getElementById('username').value = claimed;
                }
                if (user.user_metadata && user.user_metadata.full_name) {
                    document.getElementById('name').value = user.user_metadata.full_name;
                }
            }
        }

        async function createProfile() {
            const username = document.getElementById('username').value.trim().toLowerCase();
            const name = document.getElementById('name').value.trim();
            const status = document.getElementById('status-msg');

            if (!username || !name) {
                status.innerText = "Талбаруудыг бүрэн бөглөнө үү.";
                return;
            }

            const regex = /^[a-zA-Z0-9_-]+$/;
            if (!regex.test(username) || username.length < 3 || username.length > 15) {
                status.innerText = "Хэрэглэгчийн нэр 3-15 урттай, англи үсэг, тоо байх ёстой.";
                return;
            }

            status.innerText = "Хадгалж байна...";

            let userIp = "Unknown";
            try {
                const res = await fetch('https://api.ipify.org?format=json');
                const data = await res.json();
                userIp = data.ip;
            } catch (e) {}

            const { error } = await supabaseClient.from('profiles').insert([{
                id: sessionUser.id,
                username,
                name,
                ip_address: userIp
            }]);

            if (error) {
                status.innerText = "Энэ нэр бүртгэгдсэн байна. Өөр нэр сонгоно уу!";
            } else {
                localStorage.removeItem('claim_username');
                status.innerText = "Амжилттай! Шилжиж байна...";
                setTimeout(() => { window.location.href = '/settings'; }, 1000);
            }
        }

        init();
    </script>
</body>
</html>
