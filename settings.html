<!DOCTYPE html>
<html lang="mn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Тохиргоо | devnmd</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body {
            background-color: #030307; color: #fff;
            font-family: 'Segoe UI', sans-serif;
            display: flex; justify-content: center; align-items: center;
            min-height: 100vh; margin: 0; padding: 20px 0;
        }
        .container {
            background: rgba(10, 10, 18, 0.7);
            border: 1px solid rgba(0, 240, 255, 0.2);
            border-radius: 20px; padding: 35px;
            width: 100%; max-width: 550px;
            box-shadow: 0 0 30px rgba(0, 240, 255, 0.15);
            box-sizing: border-box;
        }
        .tabs {
            display: flex; justify-content: space-around; margin-bottom: 25px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }
        .tab {
            padding: 10px 15px; cursor: pointer; color: #555566; font-weight: bold;
        }
        .tab.active { color: #00f0ff; border-bottom: 2px solid #00f0ff; }
        h2 { text-align: center; margin-bottom: 25px; color: #00f0ff; }
        .group { margin-bottom: 18px; text-align: left;}
        label { display: block; font-size: 12px; margin-bottom: 6px; color: #8a8a9e; font-weight: bold; text-transform: uppercase; }
        input, textarea, select {
            width: 100%; padding: 12px; background: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(255, 255, 255, 0.05); border-radius: 10px;
            color: #fff; box-sizing: border-box;
        }
        input:focus, textarea:focus { outline: none; border-color: #00f0ff; }
        button {
            width: 100%; padding: 14px; background: #00f0ff; border: none;
            color: #000; font-weight: bold; border-radius: 10px;
            cursor: pointer; font-size: 16px; margin-top: 10px;
        }
        button:hover { background: #55f7ff; }
        .logout-btn { background: #ff0055; margin-top: 10px; color: white;}
        .logout-btn:hover { background: #ff3377; }
        .status { text-align: center; color: #00f0ff; font-weight: bold; margin-top: 10px; }
        
        /* Admin Panel Styles */
        .admin-user-list {
            width: 100%; border-collapse: collapse; margin-top: 20px; font-size: 12px;
        }
        .admin-user-list th, .admin-user-list td {
            border: 1px solid rgba(255, 255, 255, 0.05); padding: 8px; text-align: left;
        }
        .admin-user-list th { background: rgba(0, 240, 255, 0.1); color: #00f0ff; }
        .admin-btn {
            padding: 4px 8px; font-size: 10px; border-radius: 4px; cursor: pointer; font-weight: bold; border: none;
        }
        .ban-btn { background: #ff0055; color: white; }
        .unban-btn { background: #00ff66; color: black; }
        .reset-btn { background: #ff8800; color: black; }
        .badge-btn { background: #bd00ff; color: white; }
    </style>
</head>
<body>

    <div class="container" id="settings-container">
        <h2>Уншиж байна...</h2>
    </div>

    <script>
        const SUPABASE_URL = "https://jrzgxrptvirolfqhisqp.supabase.co";
        const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Impyemd4cnB0dmlyb2xmcWhpc3FwIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODQxMjEwODEsImV4cCI6MjA5OTY5NzA4MX0.DSFIaJ8PnmXu3PA4Y9tBT5ibGIBtA5w6f7iHmCrf86M";
        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        const container = document.getElementById('settings-container');
        let sessionUser = null;
        let userProfile = null;
        let activeAdminTab = 'settings'; // settings эсвэл admin

        async function checkUser() {
            const { data: { user } } = await supabaseClient.auth.getUser();
            if (!user) {
                window.location.href = '/register.html';
                return;
            }
            sessionUser = user;

            const { data: profile } = await supabaseClient
                .from('profiles')
                .select('*')
                .eq('id', user.id)
                .maybeSingle();

            userProfile = profile;
            renderView();
        }

        function renderView() {
            // Шинээр Username авах хуудас
            if (!userProfile) {
                container.innerHTML = `
                    <h2>Username сонгох</h2>
                    <div class="group">
                        <label>Username (солих боломжгүй)</label>
                        <input type="text" id="username" required placeholder="Жишээ нь: devnmd">
                    </div>
                    <div class="group">
                        <label>Бүтэн нэр</label>
                        <input type="text" id="name" required placeholder="Өөрийн нэр">
                    </div>
                    <button onclick="createProfile()">Хаяг үүсгэх</button>
                    <div class="status" id="status-msg"></div>
                `;
                return;
            }

            // Хэрэв админ хэрэглэгч нэвтэрсэн бол
            const isAdmin = userProfile.username === 'devnmd' || userProfile.is_admin === true;

            let tabHeader = '';
            if (isAdmin) {
                tabHeader = `
                    <div class="tabs">
                        <div class="tab ${activeAdminTab === 'settings' ? 'active' : ''}" onclick="switchTab('settings')">Миний тохиргоо</div>
                        <div class="tab ${activeAdminTab === 'admin' ? 'active' : ''}" onclick="switchTab('admin')">Админ хяналт</div>
                    </div>
                `;
            }

            if (activeAdminTab === 'settings') {
                container.innerHTML = `
                    ${tabHeader}
                    <h2>Хуудсаа тохируулах</h2>
                    <p style="text-align:center; color:#00f0ff; font-weight:bold;">@${userProfile.username}</p>
                    <div class="group">
                        <label>Бүтэн нэр</label>
                        <input type="text" id="name" value="${userProfile.name}">
                    </div>
                    <div class="group">
                        <label>Bio (Танилцуулга)</label>
                        <textarea id="bio" rows="2">${userProfile.bio || ''}</textarea>
                    </div>
                    <div class="group">
                        <label>Профайл зураг (Сонгох)</label>
                        <input type="file" id="avatar-file" accept="image/*">
                    </div>
                    <div class="group">
                        <label>Арын дуу (Audio файл)</label>
                        <input type="file" id="music-file" accept="audio/*">
                    </div>
                    <div class="group">
                        <label>Discord</label>
                        <input type="text" id="discord" value="${userProfile.discord || ''}">
                    </div>
                    <div class="group">
                        <label>Instagram</label>
                        <input type="text" id="instagram" value="${userProfile.instagram || ''}">
                    </div>
                    <div class="group">
                        <label>GitHub</label>
                        <input type="text" id="github" value="${userProfile.github || ''}">
                    </div>
                    <button onclick="updateProfile()">Мэдээлэл шинэчлэх</button>
                    <button class="logout-btn" onclick="logout()">Гарах</button>
                    <div class="status" id="status-msg"></div>
                `;
            } else {
                renderAdminPanel(tabHeader);
            }
        }

        function switchTab(tab) {
            activeAdminTab = tab;
            renderView();
        }

        async function renderAdminPanel(tabHeader) {
            container.innerHTML = `
                ${tabHeader}
                <h2>Админ удирдлага</h2>
                <div id="admin-status" class="status">Ачаалж байна...</div>
                <div style="overflow-x: auto;">
                    <table class="admin-user-list">
                        <thead>
                            <tr>
                                <th>Хэрэглэгч</th>
                                <th>Нэр</th>
                                <th>IP Хаяг</th>
                                <th>Тэмдэг</th>
                                <th>Булхай</th>
                                <th>Үйлдэл</th>
                            </tr>
                        </thead>
                        <tbody id="users-table-body">
                            </tbody>
                    </table>
                </div>
            `;

            try {
                const { data: users, error } = await supabaseClient
                    .from('profiles')
                    .select('*')
                    .order('created_at', { ascending: false });

                if (error) throw error;

                document.getElementById('admin-status').innerText = "";
                const tableBody = document.getElementById('users-table-body');
                
                users.forEach(user => {
                    const tr = document.createElement('tr');
                    tr.innerHTML = `
                        <td style="color: #00f0ff; font-weight: bold;">@${user.username}</td>
                        <td>${user.name}</td>
                        <td><code style="color: #ff007f;">${user.ip_address || 'Байхгүй'}</code></td>
                        <td><span style="color:#bd00ff; font-weight:bold;">${user.badge || '-'}</span></td>
                        <td>${user.is_banned ? '<span style="color:red;font-weight:bold;">БАН</span>' : 'Идэвхтэй'}</td>
                        <td>
                            <button class="admin-btn ${user.is_banned ? 'unban-btn' : 'ban-btn'}" onclick="adminToggleBan('${user.id}', ${user.is_banned})">
                                ${user.is_banned ? 'Унтраах' : 'Хэрэглэгч бан'}
                            </button>
                            <button class="admin-btn reset-btn" onclick="adminResetData('${user.id}')">Reset</button>
                            <button class="admin-btn badge-btn" onclick="adminSetBadge('${user.id}', '${user.badge || ''}')">Badge</button>
                        </td>
                    `;
                    tableBody.appendChild(tr);
                });

            } catch (err) {
                document.getElementById('admin-status').innerText = "Алдаа: " + err.message;
            }
        }

        // АДМИНЫ ҮЙЛДЛҮҮД
        async function adminToggleBan(userId, currentBanStatus) {
            const status = document.getElementById('admin-status');
            status.innerText = "Шинэчилж байна...";
            const { error } = await supabaseClient
                .from('profiles')
                .update({ is_banned: !currentBanStatus })
                .eq('id', userId);

            if (error) alert(error.message);
            else renderView();
        }

        async function adminResetData(userId) {
            if (!confirm("Энэ хэрэглэгчийн бүх мэдээллийг устгахдаа итгэлтэй байна уу? (Зөвхөн нэр ба username үлдэнэ)")) return;
            const status = document.getElementById('admin-status');
            status.innerText = "Устгаж байна...";
            const { error } = await supabaseClient
                .from('profiles')
                .update({
                    bio: null,
                    avatar: null,
                    music_url: null,
                    discord: null,
                    instagram: null,
                    github: null,
                    likes_count: 0
                })
                .eq('id', userId);

            if (error) alert(error.message);
            else renderView();
        }

        async function adminSetBadge(userId, currentBadge) {
            const newBadge = prompt("Badge оруулна уу (Хоосон орхивол устгана). Жишээ: Verified, Pro, Admin, VIP, OG", currentBadge);
            if (newBadge === null) return;

            const status = document.getElementById('admin-status');
            status.innerText = "Тэмдэг сольж байна...";
            const { error } = await supabaseClient
                .from('profiles')
                .update({ badge: newBadge || null })
                .eq('id', userId);

            if (error) alert(error.message);
            else renderView();
        }

        // ХЭРЭГЛЭГЧИЙН ҮЙЛДЛҮҮД
        async function createProfile() {
            const username = document.getElementById('username').value.trim().toLowerCase();
            const name = document.getElementById('name').value.trim();
            const status = document.getElementById('status-msg');

            const regex = /^[a-zA-Z0-9_-]+$/;
            if (!regex.test(username)) {
                status.innerText = "Username буруу байна (зөвхөн англи үсэг, тоо).";
                return;
            }

            status.innerText = "Хадгалж байна...";
            
            // Түр хадгалсан IP-г авах
            const userIp = localStorage.getItem('temp_user_ip') || 'Unknown';

            // Админ нэрийг шалгаж админ эрх өгөх
            const makeAdmin = (username === 'devnmd');

            const { error } = await supabaseClient.from('profiles').insert([{
                id: sessionUser.id,
                username,
                name,
                ip_address: userIp,
                is_admin: makeAdmin
            }]);

            if (error) {
                status.innerText = "Алдаа: Энэ Username аль хэдийн бүртгэгдсэн байна!";
            } else {
                localStorage.setItem('devnmd_username', username);
                window.location.reload();
            }
        }

        async function updateProfile() {
            const name = document.getElementById('name').value.trim();
            const bio = document.getElementById('bio').value.trim();
            const discord = document.getElementById('discord').value.trim();
            const instagram = document.getElementById('instagram').value.trim();
            const github = document.getElementById('github').value.trim();
            const avatarFile = document.getElementById('avatar-file').files[0];
            const musicFile = document.getElementById('music-file').files[0];
            const status = document.getElementById('status-msg');

            status.innerText = "Шинэчилж байна (түр хүлээнэ үү)...";

            let avatarUrl = userProfile.avatar;
            let musicUrl = userProfile.music_url;

            try {
                if (avatarFile) {
                    const ext = avatarFile.name.split('.').pop();
                    const path = `${sessionUser.id}/avatar_${Date.now()}.${ext}`;
                    const { error: uploadErr } = await supabaseClient.storage.from('avatars').upload(path, avatarFile, { upsert: true });
                    if (uploadErr) throw uploadErr;
                    avatarUrl = supabaseClient.storage.from('avatars').getPublicUrl(path).data.publicUrl;
                }

                if (musicFile) {
                    const ext = musicFile.name.split('.').pop();
                    const path = `${sessionUser.id}/music_${Date.now()}.${ext}`;
                    const { error: uploadErr } = await supabaseClient.storage.from('music').upload(path, musicFile, { upsert: true });
                    if (uploadErr) throw uploadErr;
                    musicUrl = supabaseClient.storage.from('music').getPublicUrl(path).data.publicUrl;
                }

                const { error } = await supabaseClient.from('profiles').update({
                    name, bio, discord, instagram, github, avatar: avatarUrl, music_url: musicUrl
                }).eq('id', sessionUser.id);

                if (error) throw error;
                
                localStorage.setItem('devnmd_username', userProfile.username);
                status.innerText = "Амжилттай хадгалагдлаа!";
                setTimeout(() => window.location.href = `/${userProfile.username}`, 1000);
            } catch (err) {
                console.error(err);
                status.innerText = "Алдаа гарлаа: " + err.message;
            }
        }

        async function logout() {
            await supabaseClient.auth.signOut();
            window.location.reload();
        }

        checkUser();
    </script>
</body>
</html>
