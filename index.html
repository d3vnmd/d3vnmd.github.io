<!DOCTYPE html>
<html lang="mn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>devnmd | Сошиал холбоосын нэгдсэн хуудас</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root {
            --bg-blur: 10px;
            --bg-opacity: 0.6;
            --accent-color: #bd00ff;
            --text-color: #ffffff;
            --font-family: 'Segoe UI', sans-serif;
            --cursor-type: default;
        }
        body {
            background-color: #050409;
            color: var(--text-color);
            font-family: var(--font-family);
            margin: 0;
            overflow-x: hidden;
            cursor: var(--cursor-type) !important;
            perspective: 1000px;
        }
        #bg-container {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: -2;
            background-size: cover;
            background-position: center;
            pointer-events: none;
        }
        #bg-video {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            object-fit: cover;
            z-index: -2;
            pointer-events: none;
        }
        #enter-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: #050409;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 9999;
            cursor: pointer;
            font-size: 20px;
            font-weight: bold;
            color: var(--accent-color);
            text-shadow: 0 0 10px var(--accent-color);
            text-transform: uppercase;
            animation: pulse 2s infinite;
        }
        @keyframes pulse {
            0% { opacity: 0.4; }
            50% { opacity: 1; }
            100% { opacity: 0.4; }
        }

        /* 🏠 ГОЛ ХУУДАСНЫ СТИЛЬ (Guns.lol Clone) */
        .landing-page {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
            box-sizing: border-box;
        }
        /* Ухаалаг Навбар */
        .navbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 30px;
            background: rgba(13, 11, 22, 0.7);
            border: 1px solid rgba(138, 43, 226, 0.2);
            border-radius: 50px;
            backdrop-filter: blur(10px);
            margin-top: 20px;
        }
        .logo {
            font-size: 24px; font-weight: 900;
            background: linear-gradient(45deg, #00f0ff, #bd00ff);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            text-decoration: none;
        }
        .nav-links { display: flex; gap: 25px; align-items: center; }
        .nav-link { color: #a5a5b5; text-decoration: none; font-weight: 600; font-size: 14px; transition: 0.2s; }
        .nav-link:hover { color: #fff; }
        .nav-btn {
            background: rgba(189, 0, 255, 0.2);
            border: 1px solid #bd00ff;
            color: #fff; padding: 10px 22px; border-radius: 50px;
            text-decoration: none; font-weight: bold; font-size: 14px;
            transition: 0.2s; box-shadow: 0 0 15px rgba(189,0,255,0.3);
        }
        .nav-btn:hover { background: #bd00ff; box-shadow: 0 0 20px rgba(189,0,255,0.6); }

        /* Hero Хэсэг */
        .hero {
            text-align: center;
            padding: 100px 20px 60px 20px;
        }
        .hero h1 {
            font-size: 56px; font-weight: 900; margin: 0 0 20px 0;
            background: linear-gradient(to right, #fff, #a5a5b5);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        }
        .hero p {
            font-size: 18px; color: #8a8a9e; max-width: 600px; margin: 0 auto 40px auto; line-height: 1.6;
        }
        .hero-btns { display: flex; gap: 15px; justify-content: center; }

        /* Статистик Картууд */
        .stats-section {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 20px; margin-bottom: 80px;
        }
        .stat-card {
            background: rgba(13, 11, 22, 0.4);
            border: 1px solid rgba(138, 43, 226, 0.1);
            border-radius: 20px; padding: 30px; text-align: center;
            backdrop-filter: blur(10px);
        }
        .stat-card h3 { margin: 0 0 10px 0; color: #8a8a9e; font-size: 14px; text-transform: uppercase; letter-spacing: 1px;}
        .stat-card p { margin: 0; font-size: 36px; font-weight: 900; color: #00f0ff; text-shadow: 0 0 15px rgba(0,240,255,0.3); }

        /* Тэргүүлэгчдийн самбар (Leaderboard) */
        .leaderboard-section {
            background: rgba(13, 11, 22, 0.4);
            border: 1px solid rgba(138, 43, 226, 0.1);
            border-radius: 24px; padding: 40px; margin-bottom: 80px;
            backdrop-filter: blur(10px);
        }
        .leaderboard-section h2 { margin-top: 0; font-size: 28px; font-weight: 800; color: #fff; margin-bottom: 30px; text-align: center; }
        .table-container { overflow-x: auto; }
        table { width: 100%; border-collapse: collapse; text-align: left; }
        th, td { padding: 16px; border-bottom: 1px solid rgba(255, 255, 255, 0.05); }
        th { color: #8a8a9e; font-size: 12px; text-transform: uppercase; }
        tr:hover td { background: rgba(189, 0, 255, 0.05); }
        .rank { font-weight: 900; font-size: 16px; }
        .user-cell { display: flex; align-items: center; gap: 12px; }
        .user-avatar { width: 40px; height: 40px; border-radius: 50%; border: 1px solid #bd00ff; }
        .user-link { color: #00f0ff; text-decoration: none; font-weight: bold; }
        .user-link:hover { text-decoration: underline; }

        /* 👤 ХЭРЭГЛЭГЧИЙН ПРОФАЙЛ СТИЛЬ */
        .profile-container { 
            width: 100%; max-width: 420px; padding: 20px;
            transform-style: preserve-3d; box-sizing: border-box;
            margin: 0 auto; display: flex; align-items: center; min-height: 100vh;
        }
        .profile-card {
            background: rgba(10, 10, 18, var(--bg-opacity));
            border: 1px solid var(--accent-color);
            border-radius: 24px; padding: 40px 25px; text-align: center;
            box-shadow: 0 0 30px rgba(189, 0, 255, 0.15);
            backdrop-filter: blur(var(--bg-blur));
            -webkit-backdrop-filter: blur(var(--bg-blur));
            transform: translateZ(20px); transition: transform 0.1s ease-out;
            position: relative; width: 100%;
        }
        .avatar {
            width: 110px; height: 110px; border-radius: 50%;
            border: 2px solid var(--accent-color); object-fit: cover;
            margin-bottom: 20px; box-shadow: 0 0 20px rgba(189, 0, 255, 0.3);
        }
        .name { font-size: 26px; font-weight: 800; margin-bottom: 5px; display: flex; align-items: center; justify-content: center; gap: 8px;}
        .username { font-size: 14px; color: var(--accent-color); font-weight: 700; margin-bottom: 20px; }
        .bio { font-size: 14px; color: #a1a1b3; margin-bottom: 30px; line-height: 1.6; }
        .links-container { display: flex; flex-direction: column; gap: 12px; margin-bottom: 25px;}
        .link-btn-wrapper { width: 100%; display: block; text-decoration: none; box-sizing: border-box; }
        .link-btn {
            background: rgba(255, 255, 255, 0.02); border: 1px solid rgba(255, 255, 255, 0.05);
            color: #fff; padding: 16px; border-radius: 14px; font-weight: 600; font-size: 14px;
            transition: all 0.25s ease-in-out; text-align: center; width: 100%; display: block; box-sizing: border-box;
        }
        .link-btn-wrapper:hover .link-btn {
            background: var(--accent-color); color: #000; border-color: var(--accent-color);
            transform: translateY(-3px); box-shadow: 0 5px 15px rgba(189, 0, 255, 0.3);
        }
        .like-btn {
            background: rgba(255, 0, 127, 0.1); border: 1px solid rgba(255, 0, 127, 0.3);
            color: #ff007f; padding: 14px; border-radius: 14px; cursor: pointer;
            font-weight: bold; transition: 0.2s; width: 100%; box-sizing: border-box; font-size: 15px;
        }
        .like-btn:hover { background: #ff007f; color: white; transform: scale(1.02); }

        /* 📱 Гар утасны тохируулга */
        @media (max-width: 768px) {
            .navbar { border-radius: 20px; padding: 10px 20px; }
            .nav-links { display: none; } /* Гар утсан дээр энгийн цэсийг нуух */
            .hero h1 { font-size: 36px; }
            .hero p { font-size: 15px; }
        }
    </style>
</head>
<body>

    <div id="bg-container"></div>
    <video id="bg-video" autoplay loop muted style="display:none;"></video>

    <a href="/settings" id="settings-shortcut-btn">⚙️ Тохиргоо</a>

    <div id="enter-overlay" style="display: none;" onclick="startBiolink()">
        [ Click to Enter ]
    </div>

    <!-- Үндсэн ачаалах хэсэг -->
    <div id="page-content">Уншиж байна...</div>

    <script>
        const SUPABASE_URL = "https://jrzgxrptvirolfqhisqp.supabase.co";
        const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Impyemd4cnB0dmlyb2xmcWhpc3FwIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODQxMjEwODEsImV4cCI6MjA5OTY5NzA4MX0.DSFIaJ8PnmXu3PA4Y9tBT5ibGIBtA5w6f7iHmCrf86M";
        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        const urlParams = new URLSearchParams(window.location.search);
        let username = urlParams.get('u');

        if (username) {
            username = username.replace(/\/$/, "").toLowerCase();
            window.history.replaceState({}, document.title, window.location.origin + "/" + username);
        }

        const pageContent = document.getElementById('page-content');
        let audioPlayer = null;

        async function init() {
            if (!username || username === "") {
                // ГОЛ ХУУДАСНЫ ДИЗАЙН (Guns.lol-той ижилхэн Монгол хувилбар)
                pageContent.innerHTML = `
                    <div class="landing-page">
                        <nav class="navbar">
                            <a href="/" class="logo">devnmd</a>
                            <div class="nav-links">
                                <a href="#leaderboard" class="nav-link">Тэргүүлэгчид</a>
                                <a href="https://discord.gg" target="_blank" class="nav-link">Discord</a>
                                <a href="/register" class="nav-link">Нэвтрэх</a>
                            </div>
                            <a href="/register" class="nav-btn">Бүртгүүлэх</a>
                        </nav>

                        <header class="hero">
                            <h1>Хүссэн бүх зүйл тань, яг энд.</h1>
                            <p>devnmd бол орчин үеийн, маш олон төрлийн үйлдэлтэй сошиал холбоосын нэрийн хуудас үүсгэх хамгийн шилдэг платформ юм. Өөрийн профайлыг үүсгэж, бусадтай хуваалцаарай.</p>
                            <div class="hero-btns">
                                <a href="/register" class="nav-btn" style="padding: 15px 35px; font-size:16px;">Үнэгүй эхлэх</a>
                                <a href="#leaderboard" class="nav-btn" style="padding: 15px 35px; font-size:16px; background:transparent; border-color:rgba(255,255,255,0.1);">Тэргүүлэгчдийг харах</a>
                            </div>
                        </header>

                        <!-- Бодит цагийн статистик -->
                        <section class="stats-section">
                            <div class="stat-card">
                                <h3>Нийт Хэрэглэгчид</h3>
                                <p id="total-users">0</p>
                            </div>
                            <div class="stat-card">
                                <h3>Нийт Цугларсан Лайк</h3>
                                <p id="total-likes">0</p>
                            </div>
                        </section>

                        <!-- Тэргүүлэгчдийн самбар -->
                        <section class="leaderboard-section" id="leaderboard">
                            <h2>🏆 Шилдэг Тэргүүлэгчид</h2>
                            <div class="table-container">
                                <table>
                                    <thead>
                                        <tr>
                                            <th>Байр</th>
                                            <th>Хэрэглэгч</th>
                                            <th>Тэмдэг</th>
                                            <th>Нийт Лайк</th>
                                        </tr>
                                    </thead>
                                    <tbody id="leaderboard-body">
                                        <tr>
                                            <td colspan="4" style="text-align:center; color:#8a8a9e;">Тэргүүлэгчдийг ачаалж байна...</td>
                                        </tr>
                                    </tbody>
                                </table>
                            </div>
                        </section>
                    </div>
                `;
                fetchStatsAndLeaderboard();
            } else {
                document.getElementById('enter-overlay').style.display = 'flex';
                fetchUserProfile();
            }
        }

        // Бодит цагийн статистик болон Тэргүүлэгчдийг унших
        async function fetchStatsAndLeaderboard() {
            try {
                // 1. Хэрэглэгчдийн тоо авах
                const { count, error: countErr } = await supabaseClient
                    .from('profiles')
                    .select('*', { count: 'exact', head: true });
                
                if (!countErr) document.getElementById('total-users').innerText = count;

                // 2. Нийт лайк болон Тэргүүлэгчдийн жагсаалт авах
                const { data: users, error: userErr } = await supabaseClient
                    .from('profiles')
                    .select('username, name, avatar, badge, likes_count')
                    .eq('is_banned', false)
                    .order('likes_count', { ascending: false });

                if (!userErr && users) {
                    // Лайкны нийлбэр бодох
                    const sumLikes = users.reduce((sum, u) => sum + (u.likes_count || 0), 0);
                    document.getElementById('total-likes').innerText = sumLikes;

                    // Хүснэгт нөхөх (Шилдэг 10)
                    const tbody = document.getElementById('leaderboard-body');
                    tbody.innerHTML = '';
                    
                    users.slice(0, 10).forEach((user, idx) => {
                        const tr = document.createElement('tr');
                        tr.innerHTML = `
                            <td class="rank">#${idx + 1}</td>
                            <td>
                                <div class="user-cell">
                                    <img src="${user.avatar || 'https://api.dicebear.com/7.x/pixel-art/svg?seed=' + user.username}" class="user-avatar">
                                    <a href="/${user.username}" target="_blank" class="user-link">@${user.username}</a>
                                </div>
                            </td>
                            <td><span class="badge-pill" style="background:${user.badge === 'Admin' ? 'linear-gradient(45deg, #00f0ff, #bd00ff)' : '#222'};">${user.badge || 'Хэрэглэгч'}</span></td>
                            <td style="font-weight:bold; color:#ff007f;">❤️ ${user.likes_count || 0}</td>
                        `;
                        tbody.appendChild(tr);
                    });
                }
            } catch (err) {
                console.error(err);
            }
        }

        // Хэрэглэгчийн Biolink хуудсыг унших
        async function fetchUserProfile() {
            try {
                const { data: user, error } = await supabaseClient
                    .from('profiles')
                    .select('*')
                    .eq('username', username)
                    .maybeSingle();

                if (error) throw error;

                if (user) {
                    if (user.is_banned) {
                        document.getElementById('enter-overlay').style.display = 'none';
                        pageContent.innerHTML = `
                            <div class="profile-container">
                                <div class="profile-card" style="border-color: #ff0055;">
                                    <h2 style="color: #ff0055;">ХААГДСАН ХЭРЭГЛЭГЧ</h2>
                                    <p style="color: #888;">Энэ хаягийг дүрэм зөрчсөн тул түр хаасан байна.</p>
                                </div>
                            </div>
                        `;
                        return;
                    }

                    document.documentElement.style.setProperty('--bg-blur', `${user.bg_blur || 10}px`);
                    document.documentElement.style.setProperty('--bg-opacity', user.bg_opacity || 0.6);
                    document.documentElement.style.setProperty('--accent-color', user.accent_color || '#bd00ff');
                    document.documentElement.style.setProperty('--text-color', user.text_color || '#ffffff');
                    document.documentElement.style.setProperty('--font-family', user.font_family || 'Segoe UI');
                    
                    if (user.custom_cursor && user.custom_cursor !== 'default') {
                        document.documentElement.style.setProperty('--cursor-type', `url(${user.custom_cursor}), auto`);
                    }

                    if (user.background_url) {
                        const isVideo = user.bg_type === 'video' || user.background_url.endsWith('.mp4') || user.background_url.endsWith('.webm');
                        if (isVideo) {
                            const vid = document.getElementById('bg-video');
                            vid.src = user.background_url;
                            vid.style.display = 'block';
                        } else {
                            document.getElementById('bg-container').style.backgroundImage = `url(${user.background_url})`;
                        }
                    }

                    const { data: { user: loggedInUser } } = await supabaseClient.auth.getUser();
                    if (loggedInUser && loggedInUser.id === user.id) {
                        document.getElementById('settings-shortcut-btn').style.display = 'block';
                    }

                    if (user.music_url) {
                        audioPlayer = new Audio(user.music_url);
                        audioPlayer.loop = true;
                    }

                    let linksHTML = '';
                    const socials = user.socials || {};
                    for (const [platform, value] of Object.entries(socials)) {
                        if (value) {
                            let url = value;
                            let onclick = '';
                            if (platform === 'discord') {
                                if (!value.startsWith('http')) {
                                    url = '#';
                                    onclick = `onclick="navigator.clipboard.writeText('${value}'); alert('Discord ID санах ойд хуулагдлаа: ${value}'); return false;"`;
                                }
                            } else if (platform === 'instagram' && !value.startsWith('http')) {
                                url = `https://instagram.com/${value}`;
                            } else if (platform === 'github' && !value.startsWith('http')) {
                                url = `https://github.com/${value}`;
                            } else if (platform === 'youtube' && !value.startsWith('http')) {
                                url = `https://youtube.com/${value.startsWith('@') ? value : '@' + value}`;
                            } else if (platform === 'steam' && !value.startsWith('http')) {
                                url = `https://steamcommunity.com/id/${value}`;
                            } else if (platform === 'tiktok' && !value.startsWith('http')) {
                                url = `https://tiktok.com/@${value}`;
                            }
                            linksHTML += `
                                <a href="${url}" ${onclick} target="_blank" class="link-btn-wrapper">
                                    <div class="link-btn">${platform.toUpperCase()}</div>
                                </a>
                            `;
                        }
                    }

                    const customLinks = user.custom_links || [];
                    customLinks.forEach(link => {
                        if (link.title && link.url) {
                            linksHTML += `
                                <a href="${link.url.startsWith('http') ? link.url : 'https://' + link.url}" target="_blank" class="link-btn-wrapper">
                                    <div class="link-btn">${link.title}</div>
                                </a>
                            `;
                        }
                    });

                    pageContent.innerHTML = `
                        <div class="profile-container">
                            <div class="profile-card" id="card">
                                <img src="${user.avatar || 'https://api.dicebear.com/7.x/pixel-art/svg?seed=' + username}" class="avatar" alt="Avatar">
                                <div class="name">${user.name} ${user.badge ? `<span class="badge-pill">${user.badge}</span>` : ''}</div>
                                <div class="username">@${username}</div>
                                <div class="bio">${user.bio || 'Мэдээлэл оруулаагүй байна.'}</div>
                                <div class="links-container">
                                    ${linksHTML || '<p style="color: #444;">Холбоос байхгүй байна.</p>'}
                                </div>
                                <button class="like-btn" onclick="likeProfile(event)">❤️ Like: <span id="like-count">${user.likes_count || 0}</span></button>
                            </div>
                        </div>
                    `;

                    init3DTilt();

                } else {
                    pageContent.innerHTML = `
                        <div class="profile-container">
                            <div class="profile-card">
                                <h2 style="color: #ff007f;">404 Байхгүй</h2>
                                <p style="color: #888;">"${username}" нэртэй хэрэглэгч бүртгэгдээгүй байна.</p>
                                <a href="/register?claim=${username}" class="link-btn-wrapper"><div class="link-btn" style="background:#bd00ff; color:#fff; border-color:#bd00ff;">Энэ нэрийг авах</div></a>
                            </div>
                        </div>
                    `;
                }
            } catch (err) {
                console.error(err);
            }
        }

        function startBiolink() {
            const overlay = document.getElementById('enter-overlay');
            if (overlay) overlay.remove();
            if (audioPlayer) audioPlayer.play().catch(e => console.log("Music play blocked."));
        }

        async function likeProfile(event) {
            if (event) {
                event.preventDefault();
                event.stopPropagation();
            }
            const likedKey = `liked_${username}`;
            if (localStorage.getItem(likedKey)) {
                alert("Та аль хэдийн Like дарсан байна!");
                return;
            }
            const { error } = await supabaseClient.rpc('increment_likes', { profile_username: username });
            if (!error) {
                localStorage.setItem(likedKey, 'true');
                const count = document.getElementById('like-count');
                if (count) count.innerText = parseInt(count.innerText) + 1;
            }
        }

        function init3DTilt() {
            const card = document.getElementById('card');
            if ('ontouchstart' in window || navigator.maxTouchPoints > 0) return;
            
            document.addEventListener('mousemove', (e) => {
                if (!card) return;
                const xAxis = (window.innerWidth / 2 - e.pageX) / 25;
                const yAxis = (window.innerHeight / 2 - e.pageY) / 25;
                card.style.transform = `rotateY(${xAxis}deg) rotateX(${yAxis}deg)`;
            });
        }

        init();
    </script>
</body>
</html>
