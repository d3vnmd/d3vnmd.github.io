<!DOCTYPE html>
<html lang="mn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Biolink Platform</title>
    <style>
        /* Guns.lol-той төстэй харанхуй, чамин дизайн */
        body {
            background-color: #0d0d0d;
            color: #ffffff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }
        .container {
            width: 100%;
            max-width: 420px;
            padding: 20px;
        }
        .profile-card {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 24px;
            padding: 35px 25px;
            text-align: center;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
            backdrop-filter: blur(10px);
        }
        .avatar {
            width: 110px;
            height: 110px;
            border-radius: 50%;
            border: 2px solid #ff416c;
            object-fit: cover;
            margin-bottom: 15px;
        }
        .name {
            font-size: 24px;
            font-weight: 700;
            margin-bottom: 5px;
        }
        .username {
            font-size: 14px;
            color: #ff416c;
            font-weight: 600;
            margin-bottom: 15px;
        }
        .bio {
            font-size: 14px;
            color: #b3b3b3;
            margin-bottom: 25px;
            line-height: 1.5;
        }
        .links-container {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        .link-btn {
            background: rgba(255, 255, 255, 0.07);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: white;
            padding: 14px;
            border-radius: 12px;
            text-decoration: none;
            font-weight: 600;
            transition: all 0.2s ease-in-out;
        }
        .link-btn:hover {
            background: #ff416c;
            border-color: #ff416c;
            transform: translateY(-2px);
        }
        /* Олдоогүй үед харагдах хуудас */
        .not-found {
            text-align: center;
        }
    </style>
</head>
<body>

    <div class="container" id="main-container">
        <div class="profile-card">Уншиж байна...</div>
    </div>

    <script>
        // URL-аас хэрэглэгчийн нэрийг салгаж авах
        const urlParams = new URLSearchParams(window.location.search);
        let username = urlParams.get('u');

        if (username) {
            // URL-ийн сүүлийн '/' тэмдэгтийг цэвэрлэх
            username = username.replace(/\/$/, "");
        }

        const container = document.getElementById('main-container');

        if (!username || username === "") {
            // Хэрэв ямар нэгэн username бичихгүй шууд орвол харагдах нүүр хуудас
            container.innerHTML = `
                <div class="profile-card">
                    <h2>Guns.lol шиг өөрийн хуудсыг нээгээрэй</h2>
                    <p style="color: #888;">Өөрийн хуудас руу орохын тулд URL-ийн араас өөрийн нэрийг бичнэ үү.</p>
                    <p style="font-weight: bold; color: #ff416c;">Жишээ нь: d3vnmd.github.io/a</p>
                </div>
            `;
        } else {
            // JSON файлаас мэдээллийг татаж авах
            fetch('./users.json')
                .then(response => response.json())
                .then(users => {
                    const user = users[username];

                    if (user) {
                        // Хэрэглэгч олдвол түүний мэдээллийг харуулна
                        document.title = `${user.name} (@${username}) | Biolink`;
                        
                        let linksHTML = '';
                        if (user.discord) linksHTML += `<a href="#" class="link-btn">Discord: ${user.discord}</a>`;
                        if (user.instagram) linksHTML += `<a href="https://instagram.com/${user.instagram}" target="_blank" class="link-btn">Instagram</a>`;
                        if (user.github) linksHTML += `<a href="https://github.com/${user.github}" target="_blank" class="link-btn">GitHub</a>`;

                        container.innerHTML = `
                            <div class="profile-card">
                                <img src="${user.avatar}" class="avatar" alt="Avatar">
                                <div class="name">${user.name}</div>
                                <div class="username">@${username}</div>
                                <div class="bio">${user.bio}</div>
                                <div class="links-container">
                                    ${linksHTML}
                                </div>
                            </div>
                        `;
                    } else {
                        // Хэрэглэгч олдохгүй бол
                        container.innerHTML = `
                            <div class="profile-card not-found">
                                <h2 style="color: #ff416c;">404 Олдоогүй</h2>
                                <p>"${username}" нэртэй хэрэглэгч бүртгэгдээгүй байна.</p>
                                <a href="/" class="link-btn" style="display: inline-block; margin-top: 15px;">Нүүр хуудас руу буцах</a>
                            </div>
                        `;
                    }
                })
                .catch(error => {
                    console.error("Алдаа гарлаа:", error);
                    container.innerHTML = `<div class="profile-card">Мэдээлэл уншихад алдаа гарлаа.</div>`;
                });
        }
    </script>
</body>
</html>
