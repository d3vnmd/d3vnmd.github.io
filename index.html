<!DOCTYPE html>
<html lang="mn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Biolink Platform</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body {
            background-color: #0d0d0d;
            color: #ffffff;
            font-family: sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }
        .container {
            width: 100%;
            max-width: 420px;
            padding: 20px;
        }
        .profile-card {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 24px;
            padding: 35px 25px;
            text-align: center;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
            backdrop-filter: blur(10px);
        }
        .avatar {
            width: 110px;
            height: 110px;
            border-radius: 50%;
            border: 2px solid #ff416c;
            object-fit: cover;
            margin-bottom: 15px;
        }
        .name {
            font-size: 24px;
            font-weight: 700;
            margin-bottom: 5px;
        }
        .username {
            font-size: 14px;
            color: #ff416c;
            font-weight: 600;
            margin-bottom: 15px;
        }
        .bio {
            font-size: 14px;
            color: #b3b3b3;
            margin-bottom: 25px;
            line-height: 1.5;
        }
        .links-container {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        .link-btn {
            background: rgba(255, 255, 255, 0.07);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: white;
            padding: 14px;
            border-radius: 12px;
            text-decoration: none;
            font-weight: 600;
            transition: all 0.2s ease-in-out;
        }
        .link-btn:hover {
            background: #ff416c;
            border-color: #ff416c;
            transform: translateY(-2px);
        }
        .register-btn {
            display: inline-block;
            margin-top: 15px;
            background: #ff416c;
            color: white;
            padding: 10px 20px;
            border-radius: 8px;
            text-decoration: none;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <div class="container" id="main-container">
        <div class="profile-card">Уншиж байна...</div>
    </div>

    <script>
        // Өөрийн Supabase мэдээллийг энд оруулна
        const SUPABASE_URL = "ЭНД_ӨӨРИЙН_SUPABASE_URL_ХУУЛНА";
        const SUPABASE_ANON_KEY = "ЭНД_ӨӨРИЙН_SUPABASE_ANON_KEY_ХУУЛНА";

        const { createClient } = supabase;
        const supabaseClient = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        const urlParams = new URLSearchParams(window.location.search);
        let username = urlParams.get('u');

        if (username) {
            username = username.replace(/\/$/, "").toLowerCase();
        }

        const container = document.getElementById('main-container');

        // Хэрэв шууд d3vnmd.github.io руу орвол (хэрэглэгчгүй)
        if (!username || username === "") {
            container.innerHTML = `
                <div class="profile-card">
                    <h2>Өөрийн хуудсыг үүсгээрэй</h2>
                    <p style="color: #888;">Guns.lol шиг загварлаг өөрийн нэрийн хуудастай болоход ердөө 1 минут хангалттай.</p>
                    <a href="/register.html" class="register-btn">Одоо бүртгүүлэх</a>
                </div>
            `;
        } else {
            // Supabase-ээс тухайн username-ийг хайх
            async function fetchUserProfile() {
                try {
                    const { data: user, error } = await supabaseClient
                        .from('profiles')
                        .select('*')
                        .eq('username', username)
                        .maybeSingle();

                    if (error) throw error;

                    if (user) {
                        // Хэрэглэгч олдвол харуулна
                        document.title = `${user.name} (@${username})`;
                        
                        let linksHTML = '';
                        if (user.discord) linksHTML += `<a href="#" class="link-btn">Discord: ${user.discord}</a>`;
                        if (user.instagram) linksHTML += `<a href="https://instagram.com/${user.instagram}" target="_blank" class="link-btn">Instagram</a>`;
                        if (user.github) linksHTML += `<a href="https://github.com/${user.github}" target="_blank" class="link-btn">GitHub</a>`;

                        container.innerHTML = `
                            <div class="profile-card">
                                <img src="${user.avatar}" class="avatar" alt="Avatar">
                                <div class="name">${user.name}</div>
                                <div class="username">@${username}</div>
                                <div class="bio">${user.bio || 'Мэдээлэл оруулаагүй байна.'}</div>
                                <div class="links-container">
                                    ${linksHTML || '<p style="color: #555;">Холбоос нэмэгдээгүй байна.</p>'}
                                </div>
                            </div>
                        `;
                    } else {
                        // Хэрэглэгч олдохгүй бол
                        container.innerHTML = `
                            <div class="profile-card">
                                <h2 style="color: #ff416c;">404 Олдоогүй</h2>
                                <p>"${username}" нэртэй хэрэглэгч бүртгэгдээгүй байна.</p>
                                <a href="/register.html" class="register-btn">Энэ нэрийг авах</a>
                            </div>
                        `;
                    }
                } catch (err) {
                    console.error(err);
                    container.innerHTML = `<div class="profile-card">Өгөгдлийг уншихад алдаа гарлаа.</div>`;
                }
            }

            fetchUserProfile();
        }
    </script>
</body>
</html>
