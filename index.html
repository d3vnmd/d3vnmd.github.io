<!DOCTYPE html>
<html lang="mn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>devnmd</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        /* Харанхуй, чамин неон дизайн */
        body {
            background-color: #08080c;
            color: #ffffff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            overflow-x: hidden;
        }
        .container {
            width: 100%;
            max-width: 420px;
            padding: 20px;
        }
        .profile-card {
            background: rgba(15, 15, 25, 0.6);
            border: 1px solid rgba(138, 43, 226, 0.2);
            border-radius: 24px;
            padding: 40px 25px;
            text-align: center;
            box-shadow: 0 0 30px rgba(138, 43, 226, 0.15);
            backdrop-filter: blur(12px);
        }
        .avatar {
            width: 115px;
            height: 115px;
            border-radius: 50%;
            border: 2px solid #a12be2;
            object-fit: cover;
            margin-bottom: 20px;
            box-shadow: 0 0 20px rgba(161, 43, 226, 0.4);
        }
        .name {
            font-size: 26px;
            font-weight: 800;
            margin-bottom: 5px;
            letter-spacing: -0.5px;
        }
        .username {
            font-size: 14px;
            color: #a12be2;
            font-weight: 700;
            margin-bottom: 20px;
            letter-spacing: 0.5px;
        }
        .bio {
            font-size: 14px;
            color: #b0b0bc;
            margin-bottom: 30px;
            line-height: 1.6;
        }
        .links-container {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        .link-btn {
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid rgba(255, 255, 255, 0.08);
            color: white;
            padding: 15px;
            border-radius: 14px;
            text-decoration: none;
            font-weight: 600;
            font-size: 14px;
            transition: all 0.25s ease-in-out;
        }
        .link-btn:hover {
            background: #a12be2;
            border-color: #a12be2;
            transform: translateY(-3px);
            box-shadow: 0 5px 15px rgba(161, 43, 226, 0.3);
        }
        .register-btn {
            display: inline-block;
            margin-top: 20px;
            background: #a12be2;
            color: white;
            padding: 12px 24px;
            border-radius: 10px;
            text-decoration: none;
            font-weight: bold;
            transition: 0.2s;
        }
        .register-btn:hover {
            background: #b33ff3;
            transform: translateY(-2px);
        }
        .brand-logo {
            font-size: 32px;
            font-weight: 900;
            color: #ffffff;
            margin-bottom: 10px;
            background: linear-gradient(45deg, #a12be2, #ff007f);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
    </style>
</head>
<body>

    <div class="container" id="main-container">
        <div class="profile-card">Уншиж байна...</div>
    </div>

    <script>
        // Таны Supabase мэдээлэл
        const SUPABASE_URL = "https://jrzgxrptvirolfqhisqp.supabase.co";
        const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Impyemd4cnB0dmlyb2xmcWhpc3FwIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODQxMjEwODEsImV4cCI6MjA5OTY5NzA4MX0.DSFIaJ8PnmXu3PA4Y9tBT5ibGIBtA5w6f7iHmCrf86M";

        // Supabase-ийг холбож ажиллуулах
        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        const urlParams = new URLSearchParams(window.location.search);
        let username = urlParams.get('u');

        if (username) {
            username = username.replace(/\/$/, "").toLowerCase();
        }

        const container = document.getElementById('main-container');

        // Хэрэв шууд devnmd.github.io руу орвол
        if (!username || username === "") {
            container.innerHTML = `
                <div class="profile-card">
                    <div class="brand-logo">devnmd</div>
                    <p style="color: #888; font-size: 14px; margin-bottom: 20px;">Guns.lol шиг загварлаг өөрийн нэрийн хуудастай болоход ердөө 1 минут хангалттай.</p>
                    <a href="/register.html" class="register-btn">Өөрийн хуудсыг үүсгэх</a>
                </div>
            `;
        } else {
            // Supabase-ээс хайх функц
            async function fetchUserProfile() {
                try {
                    const { data: user, error } = await supabaseClient
                        .from('profiles')
                        .select('*')
                        .eq('username', username)
                        .maybeSingle();

                    if (error) throw error;

                    if (user) {
                        // Хэрэглэгч олдвол мэдээллийг харуулна
                        document.title = `${user.name} (@${username}) | devnmd`;
                        
                        let linksHTML = '';
                        if (user.discord) linksHTML += `<a href="#" class="link-btn">Discord: ${user.discord}</a>`;
                        if (user.instagram) linksHTML += `<a href="https://instagram.com/${user.instagram}" target="_blank" class="link-btn">Instagram</a>`;
                        if (user.github) linksHTML += `<a href="https://github.com/${user.github}" target="_blank" class="link-btn">GitHub</a>`;

                        container.innerHTML = `
                            <div class="profile-card">
                                <img src="${user.avatar}" class="avatar" alt="Avatar">
                                <div class="name">${user.name}</div>
                                <div class="username">@${username}</div>
                                <div class="bio">${user.bio || 'Танилцуулга оруулаагүй байна.'}</div>
                                <div class="links-container">
                                    ${linksHTML || '<p style="color: #555;">Холбоос нэмэгдээгүй байна.</p>'}
                                </div>
                            </div>
                        `;
                    } else {
                        // Хэрэглэгч олдохгүй бол
                        container.innerHTML = `
                            <div class="profile-card">
                                <h2 style="color: #ff007f; margin-bottom: 10px;">404 Олдоогүй</h2>
                                <p style="color: #888;">"${username}" нэртэй хэрэглэгч одоогоор бүртгэгдээгүй байна.</p>
                                <a href="/register.html" class="register-btn">Энэ нэрийг авах</a>
                            </div>
                        `;
                    }
                } catch (err) {
                    console.error(err);
                    container.innerHTML = `<div class="profile-card">Өгөгдлийг уншихад алдаа гарлаа.</div>`;
                }
            }

            fetchUserProfile();
        }
    </script>
</body>
</html>
