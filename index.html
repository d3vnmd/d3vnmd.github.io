<!DOCTYPE html>
<html lang="mn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>devnmd</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root {
            --bg-blur: 10px;
            --bg-opacity: 0.6;
            --accent-color: #bd00ff;
            --text-color: #ffffff;
            --font-family: 'Segoe UI', sans-serif;
            --cursor-type: default;
        }
        body {
            background-color: #050409;
            color: var(--text-color);
            font-family: var(--font-family);
            margin: 0;
            overflow-x: hidden;
            cursor: var(--cursor-type) !important;
            perspective: 1000px;
        }

        /* CRT Пиксел Тор эффект (Scanlines Overlay) */
        body::after {
            content: " ";
            display: block;
            position: fixed;
            top: 0; left: 0; bottom: 0; right: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), 
                        linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.06));
            z-index: 999;
            background-size: 100% 4px, 6px 100%;
            pointer-events: none;
        }

        #bg-container {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: -2;
            background-size: cover;
            background-position: center;
            pointer-events: none;
        }
        #bg-video {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            object-fit: cover;
            z-index: -2;
            pointer-events: none;
        }

        /* 🔊 Хөгжим Тоглуулагч UI (Зүүн дээд буланд) */
        #music-widget {
            position: fixed;
            top: 20px; left: 20px;
            z-index: 1000;
            display: flex;
            align-items: center;
            gap: 10px;
            background: rgba(13, 11, 22, 0.85);
            border: 1px solid rgba(189, 0, 255, 0.3);
            border-radius: 12px;
            padding: 8px 12px;
            box-shadow: 0 0 15px rgba(189,0,255,0.2);
            transition: 0.3s ease-in-out;
        }
        #music-widget:hover {
            border-color: #00f0ff;
            box-shadow: 0 0 20px rgba(0,240,255,0.4);
        }
        .music-btn {
            background: none; border: none; color: #fff; cursor: pointer; display: flex; align-items: center;
        }
        .volume-bar {
            width: 0; transition: width 0.3s ease-in-out; overflow: hidden; display: flex; align-items: center;
        }
        #music-widget:hover .volume-bar {
            width: 80px;
        }
        .volume-bar input[type="range"] {
            width: 70px; accent-color: var(--accent-color);
        }

        /* 🔗 Линк Баталгаажуулах Модал (Screenshot 2) */
        .confirm-modal-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.7);
            z-index: 10000;
            display: none;
            justify-content: center;
            align-items: center;
        }
        .confirm-card {
            background: #0f0f16;
            border: 1px solid rgba(138, 43, 226, 0.3);
            border-radius: 20px;
            padding: 30px;
            width: 90%;
            max-width: 400px;
            box-shadow: 0 0 35px rgba(189,0,255,0.25);
            position: relative;
            text-align: center;
        }
        .confirm-title {
            font-size: 20px; font-weight: bold; margin-bottom: 20px; text-align: left; display: flex; justify-content: space-between; align-items: center;
        }
        .confirm-close {
            cursor: pointer; color: #8a8a9e; font-size: 18px;
        }
        .confirm-subtitle {
            color: #8a8a9e; font-size: 15px; margin-bottom: 10px;
        }
        .confirm-domain-box {
            background: rgba(255,255,255,0.03);
            border: 1px solid rgba(255,255,255,0.05);
            padding: 10px 20px;
            border-radius: 10px;
            font-weight: bold;
            color: #fff;
            display: inline-block;
            margin-bottom: 25px;
        }
        .confirm-actions {
            display: flex; gap: 12px;
        }
        .confirm-btn {
            flex: 1; padding: 12px; border-radius: 12px; font-weight: bold; font-size: 14px; cursor: pointer; border: none; transition: 0.2s;
        }
        .confirm-btn-yes { background: #5a189a; color: white; }
        .confirm-btn-yes:hover { background: #7b2cbf; }
        .confirm-btn-no { background: rgba(255,255,255,0.05); color: #8a8a9e; }
        .confirm-btn-no:hover { background: rgba(255,255,255,0.1); color: #fff; }

        /* 👾 Глитч Нэр эффект (Glitch animation for Username) */
        .glitch {
            position: relative;
            font-size: 28px;
            font-weight: 900;
            letter-spacing: 1px;
            color: #fff;
            text-shadow: 0.05em 0 0 rgba(255, 0, 0, .75), -0.025em -0.05em 0 rgba(0, 255, 0, .75), 0.025em 0.05em 0 rgba(0, 0, 255, .75);
            animation: glitch-anim 500ms infinite;
        }
        @keyframes glitch-anim {
            0% {
                text-shadow: 1px 0 0 rgba(255,0,0,0.5), -1px -1px 0 rgba(0,255,0,0.3), 0 1px 0 rgba(0,0,255,0.5);
            }
            50% {
                text-shadow: -1px 0 0 rgba(255,0,0,0.5), 1px 1px 0 rgba(0,255,0,0.3), -1px -1px 0 rgba(0,0,255,0.5);
            }
            100% {
                text-shadow: 1px -1px 0 rgba(255,0,0,0.5), -1px 1px 0 rgba(0,255,0,0.3), 1px 1px 0 rgba(0,0,255,0.5);
            }
        }

        /* 🏠 ЛЭНДИНГ ХУУДАСНЫ ЗАГВАР */
        .landing-page {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
            box-sizing: border-box;
        }
        .navbar {
            display: flex; justify-content: space-between; align-items: center;
            padding: 15px 30px; background: rgba(13, 11, 22, 0.7);
            border: 1px solid rgba(138, 43, 226, 0.2); border-radius: 50px;
            backdrop-filter: blur(10px); margin-top: 20px;
        }
        .logo {
            font-size: 24px; font-weight: 900;
            background: linear-gradient(45deg, #00f0ff, #bd00ff);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            text-decoration: none;
        }
        .nav-links { display: flex; gap: 25px; align-items: center; }
        .nav-link { color: #a5a5b5; text-decoration: none; font-weight: 600; font-size: 14px; transition: 0.2s; }
        .nav-link:hover { color: #fff; }
        .nav-btn {
            background: rgba(189, 0, 255, 0.2); border: 1px solid #bd00ff;
            color: #fff; padding: 10px 22px; border-radius: 50px;
            text-decoration: none; font-weight: bold; font-size: 14px;
            transition: 0.2s; box-shadow: 0 0 15px rgba(189,0,255,0.3);
        }
        .nav-btn:hover { background: #bd00ff; box-shadow: 0 0 20px rgba(189,0,255,0.6); }

        .hero { text-align: center; padding: 100px 20px 60px 20px; }
        .hero h1 {
            font-size: 56px; font-weight: 900; margin: 0 0 20px 0;
            background: linear-gradient(to right, #fff, #a5a5b5);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        }
        .hero p { font-size: 18px; color: #8a8a9e; max-width: 600px; margin: 0 auto 40px auto; line-height: 1.6; }
        .hero-btns { display: flex; gap: 15px; justify-content: center; }

        .stats-section {
            display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 20px; margin-bottom: 80px;
        }
        .stat-card {
            background: rgba(13, 11, 22, 0.4); border: 1px solid rgba(138, 43, 226, 0.1);
            border-radius: 20px; padding: 30px; text-align: center; backdrop-filter: blur(10px);
        }
        .stat-card h3 { margin: 0 0 10px 0; color: #8a8a9e; font-size: 14px; text-transform: uppercase; }
        .stat-card p { margin: 0; font-size: 36px; font-weight: 900; color: #00f0ff; }

        .leaderboard-section {
            background: rgba(13, 11, 22, 0.4); border: 1px solid rgba(138, 43, 226, 0.1);
            border-radius: 24px; padding: 40px; margin-bottom: 80px; backdrop-filter: blur(10px);
        }
        .leaderboard-section h2 { margin-top: 0; font-size: 28px; font-weight: 800; color: #fff; margin-bottom: 30px; text-align: center; }
        .table-container { overflow-x: auto; }
        table { width: 100%; border-collapse: collapse; text-align: left; }
        th, td { padding: 16px; border-bottom: 1px solid rgba(255, 255, 255, 0.05); }
        th { color: #8a8a9e; font-size: 12px; text-transform: uppercase; }
        .rank { font-weight: 900; font-size: 16px; }
        .user-cell { display: flex; align-items: center; gap: 12px; }
        .user-avatar { width: 40px; height: 40px; border-radius: 50%; border: 1px solid #bd00ff; }
        .user-link { color: #00f0ff; text-decoration: none; font-weight: bold; }

        /* 👤 ПРОФАЙЛ СТИЛЬ */
        .profile-container { 
            width: 100%; max-width: 420px; padding: 20px;
            transform-style: preserve-3d; box-sizing: border-box;
            margin: 0 auto; display: flex; align-items: center; min-height: 100vh;
        }
        .profile-card {
            background: rgba(10, 10, 18, var(--bg-opacity));
            border: 1px solid var(--accent-color);
            border-radius: 24px; padding: 40px 25px; text-align: center;
            box-shadow: 0 0 30px rgba(189, 0, 255, 0.15);
            backdrop-filter: blur(var(--bg-blur));
            -webkit-backdrop-filter: blur(var(--bg-blur));
            transform: translateZ(20px); transition: transform 0.1s ease-out;
            position: relative; width: 100%;
        }
        .avatar {
            width: 110px; height: 110px; border-radius: 50%;
            border: 2px solid var(--accent-color); object-fit: cover;
            margin-bottom: 20px; box-shadow: 0 0 20px rgba(189, 0, 255, 0.3);
        }
        .name { font-size: 26px; font-weight: 800; margin-bottom: 5px; display: flex; align-items: center; justify-content: center; gap: 8px;}
        .username { font-size: 14px; color: var(--accent-color); font-weight: 700; margin-bottom: 20px; }
        .bio { font-size: 14px; color: #a1a1b3; margin-bottom: 30px; line-height: 1.6; }
        .links-container { display: flex; flex-direction: column; gap: 12px; margin-bottom: 25px;}
        .link-btn-wrapper { width: 100%; display: block; text-decoration: none; box-sizing: border-box; cursor: pointer; }
        .link-btn {
            background: rgba(255, 255, 255, 0.02); border: 1px solid rgba(255, 255, 255, 0.05);
            color: #fff; padding: 16px; border-radius: 14px; font-weight: 600; font-size: 14px;
            transition: all 0.25s ease-in-out; text-align: center; width: 100%; display: block; box-sizing: border-box;
        }
        .link-btn-wrapper:hover .link-btn {
            background: var(--accent-color); color: #000; border-color: var(--accent-color);
            transform: translateY(-3px); box-shadow: 0 5px 15px rgba(189, 0, 255, 0.3);
        }
        .badge-svg {
            width: 18px; height: 18px; display: inline-block; vertical-align: middle; margin-left: 5px;
        }
        .like-btn {
            background: rgba(255, 0, 127, 0.1); border: 1px solid rgba(255, 0, 127, 0.3);
            color: #ff007f; padding: 14px; border-radius: 14px; cursor: pointer;
            font-weight: bold; transition: 0.2s; width: 100%; box-sizing: border-box; font-size: 15px;
        }
        .like-btn:hover { background: #ff007f; color: white; transform: scale(1.02); }

        /* 📱 Гар утас */
        @media (max-width: 768px) {
            .navbar { border-radius: 20px; padding: 10px 20px; }
            .nav-links { display: none; }
            .hero h1 { font-size: 36px; }
        }
    </style>
</head>
<body>

    <!-- CRT Overlays & background -->
    <div id="bg-container"></div>
    <video id="bg-video" autoplay loop muted style="display:none;"></video>

    <!-- ⚙️ Хөвөх Тохиргоо товч -->
    <a href="/settings" id="settings-shortcut-btn">⚙️ Тохиргоо</a>

    <!-- 🔊 Хөгжим тохируулах виджет -->
    <div id="music-widget" style="display: none;">
        <button class="music-btn" onclick="toggleMute()">
            <svg id="volume-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"></polygon><path d="M19.07 4.93a10 10 0 0 1 0 14.14M15.54 8.46a5 5 0 0 1 0 7.07"></path></svg>
        </button>
        <div class="volume-bar">
            <input type="range" id="volume-range" min="0" max="1" step="0.05" value="0.5" oninput="adjustVolume(this.value)">
        </div>
    </div>

    <!-- 🔗 Линк баталгаажуулах цонх (Modal) -->
    <div class="confirm-modal-overlay" id="confirm-modal">
        <div class="confirm-card">
            <div class="confirm-title">
                <span>Итгэлтэй байна уу?</span>
                <span class="confirm-close" onclick="closeConfirmModal()">✕</span>
            </div>
            <p class="confirm-subtitle">Та дараах хаяг руу шилжих гэж байна:</p>
            <div class="confirm-domain-box" id="modal-target-url">Pepper.com</div>
            <div class="confirm-actions">
                <button class="confirm-btn confirm-btn-no" onclick="closeConfirmModal()">Цуцлах</button>
                <button class="confirm-btn confirm-btn-yes" id="modal-confirm-btn">Шилжих</button>
            </div>
        </div>
    </div>

    <!-- 👤 Зочид лайк дарах гэвэл гарч ирэх анхааруулга цонх -->
    <div class="confirm-modal-overlay" id="guest-modal">
        <div class="confirm-card" style="border-color:#ff0055;">
            <div class="confirm-title" style="color:#ff0055;">
                <span>Нэвтрэх шаардлагатай!</span>
                <span class="confirm-close" onclick="closeGuestModal()">✕</span>
            </div>
            <p style="color:#8a8a9e; font-size:14px; margin-bottom:25px; line-height:1.5;">
                Зөвхөн бүртгэлтэй хэрэглэгчид бусдад лайк дарах боломжтой. Та системд бүртгүүлэх эсвэл нэвтэрнэ үү.
            </p>
            <div class="confirm-actions">
                <button class="confirm-btn confirm-btn-no" onclick="closeGuestModal()">Хаах</button>
                <button class="confirm-btn confirm-btn-yes" style="background:#ff0055;" onclick="window.location.href='/register'">Нэвтрэх</button>
            </div>
        </div>
    </div>

    <!-- Click to Enter Overlay -->
    <div id="enter-overlay" style="display: none;" onclick="startBiolink()">
        [ Click to Enter ]
    </div>

    <!-- Үндсэн хуудас -->
    <div id="page-content">Уншиж байна...</div>

    <script>
        const SUPABASE_URL = "https://jrzgxrptvirolfqhisqp.supabase.co";
        const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Impyemd4cnB0dmlyb2xmcWhpc3FwIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODQxMjEwODEsImV4cCI6MjA5OTY5NzA4MX0.DSFIaJ8PnmXu3PA4Y9tBT5ibGIBtA5w6f7iHmCrf86M";
        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        const urlParams = new URLSearchParams(window.location.search);
        let username = urlParams.get('u');

        if (username) {
            username = username.replace(/\/$/, "").toLowerCase();
            window.history.replaceState({}, document.title, window.location.origin + "/" + username);
        }

        const pageContent = document.getElementById('page-content');
        let audioPlayer = null;
        let isLiking = false; // Spam-аас сэргийлэх хамгаалалтын цоож

        // Премиум SVG Тэмдэгнүүд
        const SVGBadges = {
            Verified: `<svg class="badge-svg" viewBox="0 0 24 24" fill="none"><path d="M12 2C6.5 2 2 6.5 2 12s4.5 10 10 10 10-4.5 10-10S17.5 2 12 2zm-2 15l-5-5 1.41-1.41L10 14.17l7.59-7.59L19 8l-9 9z" fill="#00f0ff"/></svg>`,
            Admin: `<svg class="badge-svg" viewBox="0 0 24 24" fill="none"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z" fill="#bd00ff"/></svg>`,
            Premium: `<svg class="badge-svg" viewBox="0 0 24 24" fill="none"><path d="M12 2L2 12h5v10h10V12h5L12 2z" fill="#ff007f"/></svg>`
        };

        async function init() {
            if (!username || username === "") {
                pageContent.innerHTML = `
                    <div class="landing-page">
                        <nav class="navbar">
                            <a href="/" class="logo">devnmd</a>
                            <div class="nav-links">
                                <a href="#leaderboard" class="nav-link">Тэргүүлэгчид</a>
                                <a href="https://discord.gg" target="_blank" class="nav-link">Discord</a>
                                <a href="/register" class="nav-link">Нэвтрэх</a>
                            </div>
                            <a href="/register" class="nav-btn">Бүртгүүлэх</a>
                        </nav>
                        <header class="hero">
                            <h1>Хүссэн бүх зүйл тань, яг энд.</h1>
                            <p>devnmd бол орчин үеийн, маш олон төрлийн үйлдэлтэй сошиал холбоосын нэрийн хуудас үүсгэх хамгийн шилдэг платформ юм.</p>
                            <div class="hero-btns">
                                <a href="/register" class="nav-btn" style="padding: 15px 35px; font-size:16px;">Үнэгүй эхлэх</a>
                            </div>
                        </header>
                        <section class="stats-section">
                            <div class="stat-card"><h3>Нийт Хэрэглэгчид</h3><p id="total-users">0</p></div>
                            <div class="stat-card"><h3>Нийт Лайк</h3><p id="total-likes">0</p></div>
                        </section>
                        <section class="leaderboard-section" id="leaderboard">
                            <h2>🏆 Шилдэг Тэргүүлэгчид</h2>
                            <div class="table-container">
                                <table>
                                    <thead><tr><th>Байр</th><th>Хэрэглэгч</th><th>Тэмдэг</th><th>Нийт Лайк</th></tr></thead>
                                    <tbody id="leaderboard-body"><tr><td colspan="4">Ачаалж байна...</td></tr></tbody>
                                </table>
                            </div>
                        </section>
                    </div>
                `;
                fetchStatsAndLeaderboard();
            } else {
                document.getElementById('enter-overlay').style.display = 'flex';
                fetchUserProfile();
            }
        }

        async function fetchStatsAndLeaderboard() {
            try {
                const { count, error: countErr } = await supabaseClient.from('profiles').select('*', { count: 'exact', head: true });
                if (!countErr) document.getElementById('total-users').innerText = count;

                const { data: users, error: userErr } = await supabaseClient.from('profiles').select('*').eq('is_banned', false).order('likes_count', { ascending: false });
                if (!userErr && users) {
                    const sumLikes = users.reduce((sum, u) => sum + (u.likes_count || 0), 0);
                    document.getElementById('total-likes').innerText = sumLikes;

                    const tbody = document.getElementById('leaderboard-body');
                    tbody.innerHTML = '';
                    users.slice(0, 10).forEach((user, idx) => {
                        let badgeStr = '';
                        if (user.badge && SVGBadges[user.badge]) badgeStr = SVGBadges[user.badge];
                        
                        const tr = document.createElement('tr');
                        tr.innerHTML = `
                            <td class="rank">#${idx + 1}</td>
                            <td>
                                <div class="user-cell">
                                    <img src="${user.avatar || 'https://api.dicebear.com/7.x/pixel-art/svg?seed=' + user.username}" class="user-avatar">
                                    <a href="/${user.username}" target="_blank" class="user-link">@${user.username}</a>
                                </div>
                            </td>
                            <td>${badgeStr || 'Хэрэглэгч'}</td>
                            <td style="font-weight:bold; color:#ff007f;">❤️ ${user.likes_count || 0}</td>
                        `;
                        tbody.appendChild(tr);
                    });
                }
            } catch (err) { console.error(err); }
        }

        async function fetchUserProfile() {
            try {
                const { data: user, error } = await supabaseClient.from('profiles').select('*').eq('username', username).maybeSingle();
                if (error) throw error;

                if (user) {
                    if (user.is_banned) {
                        document.getElementById('enter-overlay').style.display = 'none';
                        pageContent.innerHTML = `
                            <div class="profile-container">
                                <div class="profile-card" style="border-color: #ff0055;"><h2 style="color: #ff0055;">ХААГДСАН</h2><p>Дүрэм зөрчсөн тул хаасан байна.</p></div>
                            </div>
                        `;
                        return;
                    }

                    document.documentElement.style.setProperty('--bg-blur', `${user.bg_blur || 10}px`);
                    document.documentElement.style.setProperty('--bg-opacity', user.bg_opacity || 0.6);
                    document.documentElement.style.setProperty('--accent-color', user.accent_color || '#bd00ff');
                    document.documentElement.style.setProperty('--text-color', user.text_color || '#ffffff');
                    document.documentElement.style.setProperty('--font-family', user.font_family || 'Segoe UI');

                    if (user.background_url) {
                        const isVideo = user.bg_type === 'video' || user.background_url.endsWith('.mp4') || user.background_url.endsWith('.webm');
                        if (isVideo) {
                            const vid = document.getElementById('bg-video');
                            vid.src = user.background_url;
                            vid.style.display = 'block';
                        } else {
                            document.getElementById('bg-container').style.backgroundImage = `url(${user.background_url})`;
                        }
                    }

                    const { data: { user: loggedInUser } } = await supabaseClient.auth.getUser();
                    if (loggedInUser && loggedInUser.id === user.id) {
                        document.getElementById('settings-shortcut-btn').style.display = 'block';
                    }

                    if (user.music_url) {
                        audioPlayer = new Audio(user.music_url);
                        audioPlayer.loop = true;
                        document.getElementById('music-widget').style.display = 'flex';
                    }

                    let badgeHTML = '';
                    if (user.badge && SVGBadges[user.badge]) {
                        badgeHTML = SVGBadges[user.badge];
                    }

                    let linksHTML = '';
                    const socials = user.socials || {};
                    for (const [platform, value] of Object.entries(socials)) {
                        if (value) {
                            let url = value;
                            if (platform === 'discord' && !value.startsWith('http')) {
                                linksHTML += `<div class="link-btn-wrapper" onclick="navigator.clipboard.writeText('${value}'); alert('Discord ID хуулагдлаа!');"><div class="link-btn">DISCORD ID</div></div>`;
                                continue;
                            }
                            if (platform === 'instagram' && !value.startsWith('http')) url = `https://instagram.com/${value}`;
                            if (platform === 'github' && !value.startsWith('http')) url = `https://github.com/${value}`;
                            if (platform === 'youtube' && !value.startsWith('http')) url = `https://youtube.com/${value.startsWith('@') ? value : '@' + value}`;
                            if (platform === 'steam' && !value.startsWith('http')) url = `https://steamcommunity.com/id/${value}`;
                            if (platform === 'tiktok' && !value.startsWith('http')) url = `https://tiktok.com/@${value}`;

                            linksHTML += `<div class="link-btn-wrapper" onclick="triggerConfirmModal('${url}')"><div class="link-btn">${platform.toUpperCase()}</div></div>`;
                        }
                    }

                    const customLinks = user.custom_links || [];
                    customLinks.forEach(link => {
                        if (link.title && link.url) {
                            const target = link.url.startsWith('http') ? link.url : 'https://' + link.url;
                            linksHTML += `<div class="link-btn-wrapper" onclick="triggerConfirmModal('${target}')"><div class="link-btn">${link.title}</div></div>`;
                        }
                    });

                    pageContent.innerHTML = `
                        <div class="profile-container">
                            <div class="profile-card" id="card">
                                <img src="${user.avatar || 'https://api.dicebear.com/7.x/pixel-art/svg?seed=' + username}" class="avatar">
                                <div class="name glitch" data-text="${user.name}">${user.name} ${badgeHTML}</div>
                                <div class="username">@${username}</div>
                                <div class="bio">${user.bio || 'Танилцуулга оруулаагүй байна.'}</div>
                                <div class="links-container">${linksHTML || '<p style="color:#444;">Холбоос байхгүй.</p>'}</div>
                                <button class="like-btn" onclick="handleLike(event)">❤️ Лайк: <span id="like-count">${user.likes_count || 0}</span></button>
                            </div>
                        </div>
                    `;

                    init3DTilt();
                } else {
                    pageContent.innerHTML = `<div class="profile-container"><div class="profile-card"><h2>404 Олдоогүй</h2></div></div>`;
                }
            } catch (err) { console.error(err); }
        }

        // 🔗 Линк Баталгаажуулах цонхны логик
        function triggerConfirmModal(url) {
            const modal = document.getElementById('confirm-modal');
            const targetText = document.getElementById('modal-target-url');
            const confirmBtn = document.getElementById('modal-confirm-btn');

            let cleanDomain = url.replace(/^(?:https?:\/\/)?(?:www\.)?/i, "");
            if (cleanDomain.length > 25) cleanDomain = cleanDomain.substring(0, 22) + "...";

            targetText.innerText = cleanDomain;
            modal.style.display = 'flex';

            confirmBtn.onclick = function() {
                window.open(url, '_blank');
                closeConfirmModal();
            };
        }

        function closeConfirmModal() {
            document.getElementById('confirm-modal').style.display = 'none';
        }

        function closeGuestModal() {
            document.getElementById('guest-modal').style.display = 'none';
        }

        // ❤️ Лайк дарах ухаалаг систем
        async function handleLike(event) {
            event.preventDefault();
            if (isLiking) return; // Богино хугацааны цоож (Spam proof)

            const { data: { session } } = await supabaseClient.auth.getSession();
            if (!session) {
                // Бүртгэлгүй зочин бол анхааруулах цонх нээнэ
                document.getElementById('guest-modal').style.display = 'flex';
                return;
            }

            const likedKey = `liked_${username}`;
            if (localStorage.getItem(likedKey)) {
                alert("Та аль хэдийн Лайк дарсан байна!");
                return;
            }

            isLiking = true;
            const { error } = await supabaseClient.rpc('increment_likes', { profile_username: username });
            if (!error) {
                localStorage.setItem(likedKey, 'true');
                const count = document.getElementById('like-count');
                if (count) count.innerText = parseInt(count.innerText) + 1;
            }
            setTimeout(() => { isLiking = false; }, 1000); // 1 секундын дараа цоож тайлагдана
        }

        function startBiolink() {
            document.getElementById('enter-overlay').remove();
            if (audioPlayer) audioPlayer.play().catch(() => {});
        }

        function adjustVolume(val) {
            if (audioPlayer) audioPlayer.volume = val;
        }

        function toggleMute() {
            if (audioPlayer) {
                audioPlayer.muted = !audioPlayer.muted;
                document.getElementById('volume-icon').style.color = audioPlayer.muted ? '#ff0055' : '#fff';
            }
        }

        function init3DTilt() {
            const card = document.getElementById('card');
            if ('ontouchstart' in window || navigator.maxTouchPoints > 0) return;
            document.addEventListener('mousemove', (e) => {
                if (!card) return;
                const xAxis = (window.innerWidth / 2 - e.pageX) / 25;
                const yAxis = (window.innerHeight / 2 - e.pageY) / 25;
                card.style.transform = `rotateY(${xAxis}deg) rotateX(${yAxis}deg)`;
            });
        }

        init();
    </script>
</body>
</html>
