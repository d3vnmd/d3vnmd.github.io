<!DOCTYPE html>
<html lang="mn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>devnmd</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body {
            background-color: #050508;
            color: #ffffff;
            font-family: 'Segoe UI', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }
        /* Click to Enter Overlay */
        #enter-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: #050508;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 9999;
            cursor: pointer;
            font-size: 20px;
            font-weight: bold;
            letter-spacing: 2px;
            text-transform: uppercase;
            animation: pulse 2s infinite;
        }
        @keyframes pulse {
            0% { opacity: 0.5; }
            50% { opacity: 1; }
            100% { opacity: 0.5; }
        }
        .container { width: 100%; max-width: 420px; padding: 20px; }
        .profile-card {
            background: rgba(15, 15, 25, 0.6);
            border: 1px solid rgba(138, 43, 226, 0.2);
            border-radius: 24px;
            padding: 40px 25px;
            text-align: center;
            box-shadow: 0 0 30px rgba(138, 43, 226, 0.15);
            backdrop-filter: blur(12px);
        }
        .avatar {
            width: 115px; height: 115px;
            border-radius: 50%;
            border: 2px solid #a12be2;
            object-fit: cover;
            margin-bottom: 20px;
            box-shadow: 0 0 20px rgba(161, 43, 226, 0.4);
        }
        .name { font-size: 26px; font-weight: 800; margin-bottom: 5px; }
        .username { font-size: 14px; color: #a12be2; font-weight: 700; margin-bottom: 20px; }
        .bio { font-size: 14px; color: #b0b0bc; margin-bottom: 30px; line-height: 1.6; }
        .links-container { display: flex; flex-direction: column; gap: 12px; margin-bottom: 25px;}
        .link-btn {
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid rgba(255, 255, 255, 0.08);
            color: white; padding: 15px; border-radius: 14px;
            text-decoration: none; font-weight: 600; font-size: 14px;
            transition: all 0.25s ease-in-out;
        }
        .link-btn:hover {
            background: #a12be2; border-color: #a12be2;
            transform: translateY(-3px);
            box-shadow: 0 5px 15px rgba(161, 43, 226, 0.3);
        }
        .like-section {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            margin-top: 15px;
        }
        .like-btn {
            background: rgba(255, 65, 108, 0.1);
            border: 1px solid rgba(255, 65, 108, 0.3);
            color: #ff416c;
            padding: 10px 20px;
            border-radius: 12px;
            cursor: pointer;
            font-weight: bold;
            transition: 0.2s;
        }
        .like-btn:hover {
            background: #ff416c;
            color: white;
            transform: scale(1.05);
        }
        .brand-logo {
            font-size: 32px; font-weight: 900;
            background: linear-gradient(45deg, #a12be2, #ff007f);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            margin-bottom: 15px;
        }
        .nav-btn {
            display: inline-block;
            background: #a12be2; color: white;
            padding: 12px 24px; border-radius: 10px;
            text-decoration: none; font-weight: bold;
            transition: 0.2s; margin-top: 10px;
        }
    </style>
</head>
<body>

    <div id="enter-overlay" style="display: none;" onclick="startBiolink()">
        [ Click to enter ]
    </div>

    <div class="container" id="main-container">
        <div class="profile-card">Уншиж байна...</div>
    </div>

    <script>
        const SUPABASE_URL = "https://jrzgxrptvirolfqhisqp.supabase.co";
        const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Impyemd4cnB0dmlyb2xmcWhpc3FwIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODQxMjEwODEsImV4cCI6MjA5OTY5NzA4MX0.DSFIaJ8PnmXu3PA4Y9tBT5ibGIBtA5w6f7iHmCrf86M";
        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        const urlParams = new URLSearchParams(window.location.search);
        let username = urlParams.get('u');

        if (username) {
            username = username.replace(/\/$/, "").toLowerCase();
            // ?u=re хэсгийг арилгаж, цэвэрхэн /re болгох hack
            window.history.replaceState({}, document.title, window.location.origin + "/" + username);
        }

        const container = document.getElementById('main-container');
        let audioPlayer = null;

        if (!username || username === "") {
            container.innerHTML = `
                <div class="profile-card">
                    <div class="brand-logo">devnmd</div>
                    <p style="color: #888;">Guns.lol шиг хуудастай болоход ердөө 1 минут хангалттай.</p>
                    <a href="/register.html" class="nav-btn">Нэвтрэх / Бүртгүүлэх</a>
                </div>
            `;
        } else {
            document.getElementById('enter-overlay').style.display = 'flex';
            fetchUserProfile();
        }

        async function fetchUserProfile() {
            try {
                const { data: user, error } = await supabaseClient
                    .from('profiles')
                    .select('*')
                    .eq('username', username)
                    .maybeSingle();

                if (error) throw error;

                if (user) {
                    document.title = `${user.name} (@${username}) | devnmd`;
                    
                    if (user.music_url) {
                        audioPlayer = new Audio(user.music_url);
                        audioPlayer.loop = true;
                    }

                    let linksHTML = '';
                    if (user.discord) linksHTML += `<a href="#" class="link-btn">Discord: ${user.discord}</a>`;
                    if (user.instagram) linksHTML += `<a href="https://instagram.com/${user.instagram}" target="_blank" class="link-btn">Instagram</a>`;
                    if (user.github) linksHTML += `<a href="https://github.com/${user.github}" target="_blank" class="link-btn">GitHub</a>`;

                    container.innerHTML = `
                        <div class="profile-card">
                            <img src="${user.avatar || 'https://api.dicebear.com/7.x/pixel-art/svg?seed=' + username}" class="avatar" alt="Avatar">
                            <div class="name">${user.name}</div>
                            <div class="username">@${username}</div>
                            <div class="bio">${user.bio || 'Мэдээлэл оруулаагүй байна.'}</div>
                            <div class="links-container">
                                ${linksHTML || '<p style="color: #444;">Холбоос байхгүй байна.</p>'}
                            </div>
                            <div class="like-section">
                                <button class="like-btn" onclick="likeProfile()">❤️ <span id="like-count">${user.likes_count || 0}</span></button>
                            </div>
                        </div>
                    `;
                } else {
                    container.innerHTML = `
                        <div class="profile-card">
                            <h2 style="color: #ff007f;">404 Олдоогүй</h2>
                            <p style="color: #888;">"${username}" нэртэй хэрэглэгч бүртгэгдээгүй байна.</p>
                            <a href="/register.html" class="nav-btn">Энэ нэрийг авах</a>
                        </div>
                    `;
                }
            } catch (err) {
                console.error(err);
                container.innerHTML = `<div class="profile-card">Алдаа гарлаа.</div>`;
            }
        }

        function startBiolink() {
            document.getElementById('enter-overlay').style.display = 'none';
            if (audioPlayer) {
                audioPlayer.play().catch(e => console.log("Дуу тоглуулахыг зөвшөөрсөнгүй."));
            }
        }

        async function likeProfile() {
            const likedKey = `liked_${username}`;
            if (localStorage.getItem(likedKey)) {
                alert("Та аль хэдийн Like дарсан байна!");
                return;
            }

            try {
                const { error } = await supabaseClient.rpc('increment_likes', { profile_username: username });
                if (error) throw error;

                localStorage.setItem(likedKey, 'true');
                const likeCountEl = document.getElementById('like-count');
                likeCountEl.innerText = parseInt(likeCountEl.innerText) + 1;
            } catch (err) {
                console.error(err);
            }
        }
    </script>
</body>
</html>
