        async function fetchStatsAndLeaderboard() {
            try {
                const { count, error: countErr } = await supabaseClient.from('profiles').select('*', { count: 'exact', head: true });
                if (!countErr) document.getElementById('total-users').innerText = count;

                const { data: users, error: userErr } = await supabaseClient.from('profiles').select('*').eq('is_banned', false).order('likes_count', { ascending: false });
                if (!userErr && users) {
                    const sumLikes = users.reduce((sum, u) => sum + (u.likes_count || 0), 0);
                    document.getElementById('total-likes').innerText = sumLikes;

                    const tbody = document.getElementById('leaderboard-body');
                    tbody.innerHTML = '';
                    users.slice(0, 10).forEach((user, idx) => {
                        let badgeStr = '';
                        if (user.badge && SVGBadges[user.badge]) badgeStr = SVGBadges[user.badge];
                        
                        const tr = document.createElement('tr');
                        tr.innerHTML = `
                            <td>#${idx + 1}</td>
                            <td>
                                <div class="user-cell">
                                    <img src="${user.avatar || 'https://api.dicebear.com/7.x/pixel-art/svg?seed=' + user.username}" class="user-avatar">
                                    <a href="/${user.username}" target="_blank" class="user-link">@${user.username}</a>
                                </div>
                            </td>
                            <td>${badgeStr || 'User'}</td>
                            <td style="font-weight:bold; color:var(--accent-teal);">❤️ ${user.likes_count || 0}</td>
                        `;
                        tbody.appendChild(tr);
                    });
                }
            } catch (err) { console.error(err); }
        }

        async function fetchUserProfile() {
            try {
                const { data: user, error } = await supabaseClient.from('profiles').select('*').eq('username', username).maybeSingle();
                if (error) throw error;

                if (user) {
                    if (user.is_banned) {
                        document.getElementById('enter-overlay').style.display = 'none';
                        pageContent.innerHTML = `
                            <div class="profile-container">
                                <div class="profile-card" style="border-color: #ff0055;"><h2 style="color: #ff0055;">BANNED</h2><p>This user has been suspended.</p></div>
                            </div>
                        `;
                        return;
                    }

                    document.documentElement.style.setProperty('--bg-blur', `${user.bg_blur || 10}px`);
                    document.documentElement.style.setProperty('--bg-opacity', user.bg_opacity || 0.6);
                    document.documentElement.style.setProperty('--accent-teal', user.accent_color || '#00f2fe');
                    document.documentElement.style.setProperty('--font-family', user.font_family || 'Segoe UI');

                    if (user.background_url) {
                        const isVideo = user.bg_type === 'video' || user.background_url.endsWith('.mp4') || user.background_url.endsWith('.webm');
                        if (isVideo) {
                            const vid = document.getElementById('bg-video');
                            vid.src = user.background_url;
                            vid.style.display = 'block';
                        } else {
                            document.getElementById('bg-container').style.backgroundImage = `url(${user.background_url})`;
                        }
                    }

                    const { data: { user: loggedInUser } } = await supabaseClient.auth.getUser();
                    if (loggedInUser && loggedInUser.id === user.id) {
                        document.getElementById('settings-shortcut-btn').style.display = 'block';
                    }

                    if (user.music_url) {
                        audioPlayer = new Audio(user.music_url);
                        audioPlayer.loop = true;
                        document.getElementById('music-widget').style.display = 'flex';
                    }

                    let badgeHTML = '';
                    if (user.badge && SVGBadges[user.badge]) {
                        badgeHTML = SVGBadges[user.badge];
                    }

                    let linksHTML = '';
                    const socials = user.socials || {};
                    for (const [platform, value] of Object.entries(socials)) {
                        if (value) {
                            let url = value;
                            if (platform === 'discord' && !value.startsWith('http')) {
                                linksHTML += `<div class="link-btn-wrapper" onclick="navigator.clipboard.writeText('${value}'); alert('Discord ID Copied!');"><div class="link-btn">DISCORD ID</div></div>`;
                                continue;
                            }
                            if (platform === 'instagram' && !value.startsWith('http')) url = `https://instagram.com/${value}`;
                            if (platform === 'github' && !value.startsWith('http')) url = `https://github.com/${value}`;
                            if (platform === 'youtube' && !value.startsWith('http')) url = `https://youtube.com/${value.startsWith('@') ? value : '@' + value}`;
                            if (platform === 'steam' && !value.startsWith('http')) url = `https://steamcommunity.com/id/${value}`;
                            if (platform === 'tiktok' && !value.startsWith('http')) url = `https://tiktok.com/@${value}`;

                            linksHTML += `<div class="link-btn-wrapper" onclick="triggerConfirmModal('${url}')"><div class="link-btn">${platform.toUpperCase()}</div></div>`;
                        }
                    }

                    const customLinks = user.custom_links || [];
                    customLinks.forEach(link => {
                        if (link.title && link.url) {
                            const target = link.url.startsWith('http') ? link.url : 'https://' + link.url;
                            linksHTML += `<div class="link-btn-wrapper" onclick="triggerConfirmModal('${target}')"><div class="link-btn">${link.title}</div></div>`;
                        }
                    });

                    pageContent.innerHTML = `
                        <div class="profile-container">
                            <div class="profile-card" id="card">
                                <img src="${user.avatar || 'https://api.dicebear.com/7.x/pixel-art/svg?seed=' + username}" class="avatar">
                                <div class="name glitch" data-text="${user.name}">${user.name} ${badgeHTML}</div>
                                <div class="username">@${username}</div>
                                <div class="bio">${user.bio || ''}</div>
                                <div class="links-container">${linksHTML || '<p style="color:#444;">No links.</p>'}</div>
                                <button class="like-btn" onclick="handleLike(event)">❤️ Like: <span id="like-count">${user.likes_count || 0}</span></button>
                            </div>
                        </div>
                    `;

                    init3DTilt();
                } else {
                    window.location.href = `/404.html?claim=${username}`;
                }
            } catch (err) { console.error(err); }
        }

        function triggerConfirmModal(url) {
            const modal = document.getElementById('confirm-modal');
            const targetText = document.getElementById('modal-target-url');
            const confirmBtn = document.getElementById('modal-confirm-btn');

            let cleanDomain = url.replace(/^(?:https?:\/\/)?(?:www\.)?/i, "");
            if (cleanDomain.length > 25) cleanDomain = cleanDomain.substring(0, 22) + "...";

            targetText.innerText = cleanDomain;
            modal.style.display = 'flex';

            confirmBtn.onclick = function() {
                window.open(url, '_blank');
                closeConfirmModal();
            };
        }

        function closeConfirmModal() { document.getElementById('confirm-modal').style.display = 'none'; }

                title.innerText = "Copyright Policy (Зохиогчийн эрх)";
                body.innerHTML = `<p>Зохиогчийн эрхийг хүндэтгэх бодлого:</p>
                <p>Хэрэв таны оюуны өмчийг зөвшөөрөлгүй ашигласан гэж үзвэл бидэнд Discord-оор холбогдож гомдол гаргах боломжтой. Бид богино хугацаанд шалгаж арга хэмжээ авах болно.</p>`;
            } else if (type === 'status') {
                title.innerText = "Website Status (Системийн төлөв)";
                body.innerHTML = `<p>Одоогийн байдал: <strong style="color: #00ff66;">Хэвийн (All systems operational)</strong></p>
                <p>Supabase API, Realtime Database, Authentication системүүд 99.9% идэвхтэй ажиллаж байна.</p>`;
            }
            modal.style.display = 'flex';
        }

        function closeLegalModal() { document.getElementById('legal-modal').style.display = 'none'; }

        async function handleLike(event) {
            event.preventDefault();
            if (isLiking) return;

            const { data: { session } } = await supabaseClient.auth.getSession();
            if (!session) {
                document.getElementById('guest-modal').style.display = 'flex';
                return;
            }

            const likedKey = `liked_${username}`;
            if (localStorage.getItem(likedKey)) {
                alert("You already liked this bio!");
                return;
            }

            isLiking = true;
            const { error } = await supabaseClient.rpc('increment_likes', { profile_username: username });
            if (!error) {
                localStorage.setItem(likedKey, 'true');
                const count = document.getElementById('like-count');
                if (count) count.innerText = parseInt(count.innerText) + 1;
            }
            setTimeout(() => { isLiking = false; }, 1000);
        }

        function startBiolink() {
            document.getElementById('enter-overlay').remove();
            if (audioPlayer) audioPlayer.play().catch(() => {});
        }

        function adjustVolume(val) { if (audioPlayer) audioPlayer.volume = val; }

        function toggleMute() {
            if (audioPlayer) {
                audioPlayer.muted = !audioPlayer.muted;
                document.getElementById('volume-icon').style.color = audioPlayer.muted ? '#ff0055' : '#fff';
            }
        }

        function init3DTilt() {
            const card = document.getElementById('card');
            if ('ontouchstart' in window || navigator.maxTouchPoints > 0) return;
            document.addEventListener('mousemove', (e) => {
                if (!card) return;
                const xAxis = (window.innerWidth / 2 - e.pageX) / 30;
                const yAxis = (window.innerHeight / 2 - e.pageY) / 30;
                card.style.transform = `rotateY(${xAxis}deg) rotateX(${yAxis}deg)`;
            });
        }

        init();
    </script>
</body>
</html>
