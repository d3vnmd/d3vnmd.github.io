<!DOCTYPE html>
<html lang="mn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Нэвтрэх | devnmd</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body {
            background-color: #050508;
            color: #ffffff;
            font-family: 'Segoe UI', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }
        .card {
            background: rgba(15, 15, 25, 0.6);
            border: 1px solid rgba(138, 43, 226, 0.2);
            border-radius: 20px;
            padding: 40px;
            text-align: center;
            width: 100%;
            max-width: 360px;
            box-shadow: 0 0 30px rgba(138, 43, 226, 0.15);
            box-sizing: border-box;
        }
        h2 { margin-bottom: 15px; color: #a12be2;}
        p { color: #888; font-size: 14px; margin-bottom: 25px; line-height: 1.5;}
        .group { margin-bottom: 15px; }
        input {
            width: 100%; padding: 12px; background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.08); border-radius: 10px;
            color: #fff; box-sizing: border-box; text-align: center; font-size: 16px;
        }
        input:focus { outline: none; border-color: #a12be2; }
        button {
            width: 100%; padding: 12px; background: #a12be2; border: none;
            color: white; font-weight: bold; border-radius: 10px;
            cursor: pointer; font-size: 16px; transition: 0.2s;
        }
        button:hover { background: #b33ff3; }
        .back-btn { background: transparent; border: 1px solid rgba(255,255,255,0.1); color: #888; margin-top: 10px; }
        .back-btn:hover { background: rgba(255,255,255,0.05); color: #fff;}
        .status { color: #ff416c; font-size: 13px; margin-top: 15px; font-weight: bold;}
    </style>
</head>
<body>

    <!-- Алхам 1: Имэйл оруулах хэсэг -->
    <div class="card" id="email-step">
        <h2>devnmd-д нэвтрэх</h2>
        <p>Өөрийн имэйл хаягаа оруулан 6 оронтой баталгаажуулах код хүлээн авна уу.</p>
        <div class="group">
            <input type="email" id="email" placeholder="Таны имэйл хаяг" required>
        </div>
        <button onclick="sendOtp()">Код илгээх</button>
        <div class="status" id="email-status"></div>
    </div>

    <!-- Алхам 2: Код оруулж баталгаажуулах хэсэг -->
    <div class="card" id="code-step" style="display: none;">
        <h2>Баталгаажуулах</h2>
        <p>Таны имэйл рүү илгээсэн 6 оронтой баталгаажуулах кодыг оруулна уу.</p>
        <div class="group">
            <input type="text" id="otp-code" placeholder="6 оронтой код" required maxlength="6">
        </div>
        <button onclick="verifyOtp()">Баталгаажуулах</button>
        <button class="back-btn" onclick="showEmailStep()">Буцах</button>
        <div class="status" id="code-status"></div>
    </div>

    <script>
        const SUPABASE_URL = "https://jrzgxrptvirolfqhisqp.supabase.co";
        const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Impyemd4cnB0dmlyb2xmcWhpc3FwIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODQxMjEwODEsImV4cCI6MjA5OTY5NzA4MX0.DSFIaJ8PnmXu3PA4Y9tBT5ibGIBtA5w6f7iHmCrf86M";
        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        let userEmail = "";

        async function sendOtp() {
            const emailInput = document.getElementById('email');
            const status = document.getElementById('email-status');
            userEmail = emailInput.value.trim();

            if (!userEmail) {
                status.innerText = "Имэйл хаягаа оруулна уу.";
                return;
            }

            status.innerText = "Код илгээж байна...";

            // OTP Илгээх функц
            const { error } = await supabaseClient.auth.signInWithOtp({
                email: userEmail
            });

            if (error) {
                status.innerText = "Алдаа: " + error.message;
            } else {
                status.innerText = "";
                document.getElementById('email-step').style.display = 'none';
                document.getElementById('code-step').style.display = 'block';
            }
        }

        async function verifyOtp() {
            const tokenInput = document.getElementById('otp-code');
            const status = document.getElementById('code-status');
            const token = tokenInput.value.trim();

            if (!token) {
                status.innerText = "Кодоо оруулна уу.";
                return;
            }

            status.innerText = "Шалгаж байна...";

            // Оруулсан кодыг шалгах функц
            const { error } = await supabaseClient.auth.verifyOtp({
                email: userEmail,
                token: token,
                type: 'email'
            });

            if (error) {
                status.innerText = "Код буруу эсвэл хугацаа нь дууссан байна.";
            } else {
                status.innerText = "Нэвтэрлээ! Шилжиж байна...";
                setTimeout(() => {
                    window.location.href = '/settings.html';
                }, 1000);
            }
        }

        function showEmailStep() {
            document.getElementById('email-step').style.display = 'block';
            document.getElementById('code-step').style.display = 'none';
        }
    </script>
</body>
</html>
