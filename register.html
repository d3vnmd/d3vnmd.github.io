<!DOCTYPE html>
<html lang="mn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Нэвтрэх / Бүртгүүлэх | devnmd</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body {
            background-color: #030307;
            color: #ffffff;
            font-family: 'Segoe UI', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }
        .card {
            background: rgba(10, 10, 18, 0.7);
            border: 1px solid rgba(0, 240, 255, 0.2);
            border-radius: 20px;
            padding: 35px;
            width: 100%;
            max-width: 380px;
            box-shadow: 0 0 30px rgba(0, 240, 255, 0.15);
            box-sizing: border-box;
        }
        .tabs {
            display: flex;
            justify-content: space-around;
            margin-bottom: 25px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }
        .tab {
            padding: 10px 20px;
            cursor: pointer;
            color: #555566;
            font-weight: bold;
            transition: 0.2s;
        }
        .tab.active {
            color: #00f0ff;
            border-bottom: 2px solid #00f0ff;
        }
        .group {
            margin-bottom: 15px;
            text-align: left;
        }
        label {
            display: block; font-size: 11px; color: #8a8a9e;
            margin-bottom: 5px; text-transform: uppercase; font-weight: bold;
        }
        input {
            width: 100%; padding: 12px; background: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(255, 255, 255, 0.05); border-radius: 10px;
            color: white; box-sizing: border-box; font-size: 14px;
        }
        input:focus { outline: none; border-color: #00f0ff; }
        button {
            width: 100%; padding: 14px; background: #00f0ff; border: none;
            color: #000; font-weight: bold; border-radius: 10px;
            cursor: pointer; font-size: 16px; transition: 0.2s; margin-top: 10px;
        }
        button:hover { background: #55f7ff; }
        .captcha-container {
            background: rgba(0, 240, 255, 0.05);
            border: 1px dashed rgba(0, 240, 255, 0.3);
            border-radius: 10px; padding: 10px; text-align: center; margin-bottom: 15px;
        }
        .captcha-text { font-size: 16px; font-weight: bold; color: #00f0ff; margin-bottom: 8px; }
        .status { color: #ff0055; font-size: 13px; margin-top: 15px; font-weight: bold; text-align: center; }
    </style>
</head>
<body>

    <div class="card">
        <div class="tabs">
            <div class="tab active" id="tab-login" onclick="switchTab('login')">Нэвтрэх</div>
            <div class="tab" id="tab-register" onclick="switchTab('register')">Бүртгүүлэх</div>
        </div>

        <form id="authForm" onsubmit="handleAuth(event)">
            <div class="group">
                <label>Имэйл хаяг</label>
                <input type="email" id="email" required placeholder="example@gmail.com">
            </div>
            
            <div class="group">
                <label>Нууц үг</label>
                <input type="password" id="password" required placeholder="••••••••" minlength="6">
            </div>

            <div id="register-only-fields" style="display: none;">
                <div class="captcha-container">
                    <div class="captcha-text" id="captcha-question">Уншиж байна...</div>
                    <input type="number" id="captcha-answer" placeholder="Хариуг оруулна уу" style="text-align: center;">
                </div>
            </div>

            <button type="submit" id="submit-btn">Нэвтрэх</button>
            <div class="status" id="status-msg"></div>
        </form>
    </div>

    <script>
        const SUPABASE_URL = "https://jrzgxrptvirolfqhisqp.supabase.co";
        const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Impyemd4cnB0dmlyb2xmcWhpc3FwIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODQxMjEwODEsImV4cCI6MjA5OTY5NzA4MX0.DSFIaJ8PnmXu3PA4Y9tBT5ibGIBtA5w6f7iHmCrf86M";
        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        let activeTab = "login";
        let num1 = 0, num2 = 0, correctAnswer = 0;
        let deviceIp = "Unknown";

        // IP хаяг шалгаж авах функц
        async function fetchIpAddress() {
            try {
                const res = await fetch('https://api.ipify.org?format=json');
                const data = await res.json();
                deviceIp = data.ip;
            } catch (e) {
                console.log("IP авах боломжгүй байна.");
            }
        }

        async function checkDeviceAndSession() {
            await fetchIpAddress();
            const { data: { session } } = await supabaseClient.auth.getSession();
            
            if (session) {
                const { data: user } = await supabaseClient
                    .from('profiles')
                    .select('username')
                    .eq('id', session.user.id)
                    .maybeSingle();

                if (user) {
                    window.location.href = `/${user.username}`;
                } else {
                    window.location.href = '/settings.html';
                }
                return;
            }

            const savedUsername = localStorage.getItem('devnmd_username');
            if (savedUsername) {
                document.getElementById('status-msg').innerHTML = `
                    Энэ төхөөрөмж дээр бүртгэлтэй байна: 
                    <a href="/${savedUsername}" style="color: #00f0ff; font-weight: bold;">@${savedUsername}</a><br>
                    Нэвтрэхийн тулд имэйл, нууц үгээ оруулна уу.
                `;
            }
        }

        checkDeviceAndSession();

        function generateCaptcha() {
            num1 = Math.floor(Math.random() * 10) + 1;
            num2 = Math.floor(Math.random() * 10) + 1;
            correctAnswer = num1 + num2;
            document.getElementById('captcha-question').innerText = `Бодно уу: ${num1} + ${num2} = ?`;
        }

        function switchTab(tab) {
            activeTab = tab;
            const loginTab = document.getElementById('tab-login');
            const registerTab = document.getElementById('tab-register');
            const registerFields = document.getElementById('register-only-fields');
            const submitBtn = document.getElementById('submit-btn');
            const statusMsg = document.getElementById('status-msg');

            statusMsg.innerText = "";

            if (tab === "login") {
                loginTab.classList.add('active');
                registerTab.classList.remove('active');
                registerFields.style.display = 'none';
                submitBtn.innerText = "Нэвтрэх";
            } else {
                registerTab.classList.add('active');
                loginTab.classList.remove('active');
                registerFields.style.display = 'block';
                submitBtn.innerText = "Бүртгүүлэх";
                generateCaptcha();
            }
        }

        async function handleAuth(event) {
            event.preventDefault();
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;
            const status = document.getElementById('status-msg');
            const btn = document.getElementById('submit-btn');

            status.innerText = "Уншиж байна...";
            btn.disabled = true;

            if (activeTab === "register") {
                const userAnswer = parseInt(document.getElementById('captcha-answer').value);
                if (userAnswer !== correctAnswer) {
                    status.innerText = "Анти-Спам хариу буруу байна!";
                    btn.disabled = false;
                    generateCaptcha();
                    return;
                }

                const { data, error } = await supabaseClient.auth.signUp({
                    email: email,
                    password: password
                });

                if (error) {
                    status.innerText = "Алдаа: " + error.message;
                    btn.disabled = false;
                } else {
                    // IP хаягийг хадгалахад бэлдэх
                    localStorage.setItem('temp_user_ip', deviceIp);
                    status.innerText = "Бүртгэл амжилттай! Шилжиж байна...";
                    setTimeout(() => {
                        window.location.href = '/settings.html';
                    }, 1000);
                }
            } else {
                const { data, error } = await supabaseClient.auth.signInWithPassword({
                    email: email,
                    password: password
                });

                if (error) {
                    status.innerText = "Имэйл эсвэл нууц үг буруу байна.";
                    btn.disabled = false;
                } else {
                    status.innerText = "Нэвтэрлээ! Шилжиж байна...";
                    setTimeout(() => {
                        window.location.href = '/settings.html';
                    }, 1000);
                }
            }
        }
    </script>
</body>
</html>
