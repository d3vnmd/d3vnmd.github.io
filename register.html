<!DOCTYPE html>
<html lang="mn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Нэвтрэх | devnmd</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body {
            background-color: #050508;
            color: #ffffff;
            font-family: 'Segoe UI', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }
        .card {
            background: rgba(15, 15, 25, 0.6);
            border: 1px solid rgba(138, 43, 226, 0.2);
            border-radius: 20px;
            padding: 40px;
            text-align: center;
            width: 100%;
            max-width: 360px;
            box-shadow: 0 0 30px rgba(138, 43, 226, 0.15);
            box-sizing: border-box;
        }
        h2 { margin-bottom: 15px; color: #a12be2;}
        p { color: #888; font-size: 14px; margin-bottom: 25px; line-height: 1.5;}
        .group { margin-bottom: 15px; }
        input {
            width: 100%; padding: 12px; background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.08); border-radius: 10px;
            color: #fff; box-sizing: border-box; text-align: center; font-size: 16px;
        }
        input:focus { outline: none; border-color: #a12be2; }
        button {
            width: 100%; padding: 12px; background: #a12be2; border: none;
            color: white; font-weight: bold; border-radius: 10px;
            cursor: pointer; font-size: 16px; transition: 0.2s;
        }
        button:hover { background: #b33ff3; }
        .status { color: #ff416c; font-size: 13px; margin-top: 15px; font-weight: bold;}
    </style>
</head>
<body>

    <div class="card">
        <h2>devnmd-д нэвтрэх</h2>
        <p>Өөрийн имэйл хаягаа оруулаад нэвтрэх линк хүлээн авна уу. Тэр линк дээр дараад шууд хуудсаа үүсгэх боломжтой.</p>
        <div class="group">
            <input type="email" id="email" placeholder="Таны имэйл хаяг" required>
        </div>
        <button id="send-btn" onclick="sendMagicLink()">Нэвтрэх линк илгээх</button>
        <div class="status" id="email-status"></div>
    </div>

    <script>
        const SUPABASE_URL = "https://jrzgxrptvirolfqhisqp.supabase.co";
        const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Impyemd4cnB0dmlyb2xmcWhpc3FwIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODQxMjEwODEsImV4cCI6MjA5OTY5NzA4MX0.DSFIaJ8PnmXu3PA4Y9tBT5ibGIBtA5w6f7iHmCrf86M";
        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        async function sendMagicLink() {
            const emailInput = document.getElementById('email');
            const status = document.getElementById('email-status');
            const btn = document.getElementById('send-btn');
            const email = emailInput.value.trim();

            if (!email) {
                status.innerText = "Имэйл хаягаа оруулна уу.";
                return;
            }

            status.innerText = "Илгээж байна...";
            btn.disabled = true;

            const { error } = await supabaseClient.auth.signInWithOtp({
                email: email,
                options: {
                    emailRedirectTo: window.location.origin + '/settings.html'
                }
            });

            if (error) {
                status.innerText = "Алдаа: " + error.message;
                btn.disabled = false;
            } else {
                status.innerText = "Имэйл рүү тань линк илгээлээ! Имэйлээ шалгана уу.";
            }
        }
    </script>
</body>
</html>
