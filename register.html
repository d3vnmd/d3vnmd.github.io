<!DOCTYPE html>
<html lang="mn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Нэвтрэх | devnmd</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body {
            background-color: #030307;
            color: #ffffff;
            font-family: 'Segoe UI', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }
        .card {
            background: rgba(10, 10, 18, 0.7);
            border: 1px solid rgba(0, 240, 255, 0.2);
            border-radius: 20px;
            padding: 40px;
            text-align: center;
            width: 100%;
            max-width: 380px;
            box-shadow: 0 0 30px rgba(0, 240, 255, 0.15);
            box-sizing: border-box;
        }
        .brand-logo {
            font-size: 36px;
            font-weight: 900;
            background: linear-gradient(45deg, #00f0ff, #bd00ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 10px;
            text-shadow: 0 0 15px rgba(0,240,255,0.2);
        }
        p {
            color: #8a8a9e;
            font-size: 14px;
            line-height: 1.6;
            margin-bottom: 30px;
        }
        .discord-btn {
            background: #5865F2;
            color: #ffffff;
            border: none;
            padding: 14px 20px;
            border-radius: 12px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            width: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            transition: all 0.2s ease-in-out;
            box-shadow: 0 4px 15px rgba(88, 101, 242, 0.3);
        }
        .discord-btn:hover {
            background: #4752C4;
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(88, 101, 242, 0.5);
        }
        .discord-icon {
            width: 24px;
            height: 24px;
            fill: white;
        }
        .status {
            color: #ff0055;
            font-size: 13px;
            margin-top: 20px;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <div class="card">
        <div class="brand-logo">devnmd</div>
        <p>Discord хаягаараа ганцхан даралтаар нэвтэрч, өөрийн нэрийн хуудсаа үнэгүй үүсгээрэй.</p>
        
        <button class="discord-btn" onclick="signInWithDiscord()">
            <svg class="discord-icon" viewBox="0 0 127.14 96.36">
                <path d="M107.7,8.07A105.15,105.15,0,0,0,77.26,0a77.19,77.19,0,0,0-3.3,6.83A96.67,96.67,0,0,0,53.22,6.83,77.19,77.19,0,0,0,49.88,0,105.15,105.15,0,0,0,19.44,8.07C3.66,31.58-1.86,54.65,1,77.53A105.73,105.73,0,0,0,32,96.36a77.7,77.7,0,0,0,6.63-10.85,68.43,68.43,0,0,1-10.5-5c.88-.65,1.72-1.34,2.53-2a75.58,75.58,0,0,0,73,0c.81.71,1.65,1.4,2.53,2a68.43,68.43,0,0,1-10.5,5,77.7,77.7,0,0,0,6.63,10.85,105.73,105.73,0,0,0,31-18.83C129.87,50.75,123.38,28,107.7,8.07ZM42.45,65.69C36.18,65.69,31,60,31,53S36.18,40.36,42.45,40.36,53.83,46,53.83,53,48.72,65.69,42.45,65.69Zm42.24,0C78.41,65.69,73.24,60,73.24,53S78.41,40.36,84.69,40.36,96.07,46,96.07,53,91,65.69,84.69,65.69Z"/>
            </svg>
            Discord-оор нэвтрэх
        </button>
        <div class="status" id="status-msg"></div>
    </div>

    <script>
        const SUPABASE_URL = "https://jrzgxrptvirolfqhisqp.supabase.co";
        const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Impyemd4cnB0dmlyb2xmcWhpc3FwIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODQxMjEwODEsImV4cCI6MjA5OTY5NzA4MX0.DSFIaJ8PnmXu3PA4Y9tBT5ibGIBtA5w6f7iHmCrf86M";
        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        async function checkDeviceAndSession() {
            const { data: { session } } = await supabaseClient.auth.getSession();
            
            if (session) {
                const { data: user } = await supabaseClient
                    .from('profiles')
                    .select('username')
                    .eq('id', session.user.id)
                    .maybeSingle();

                if (user) {
                    window.location.href = `/${user.username}`;
                } else {
                    window.location.href = '/settings.html';
                }
            }
        }

        checkDeviceAndSession();

        async function signInWithDiscord() {
            const status = document.getElementById('status-msg');
            status.innerText = "Шилжиж байна...";
            
            const { error } = await supabaseClient.auth.signInWithOAuth({
                provider: 'discord',
                options: {
                    redirectTo: window.location.origin + '/settings.html'
                }
            });

            if (error) {
                status.innerText = "Алдаа: " + error.message;
            }
        }
    </script>
</body>
</html>
