<!DOCTYPE html>
<html lang="mn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Бүртгүүлэх | Biolink</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body {
            background-color: #0d0d0d;
            color: #ffffff;
            font-family: sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }
        .form-container {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 20px;
            padding: 30px;
            width: 100%;
            max-width: 400px;
        }
        h2 { text-align: center; margin-bottom: 20px; color: #ff416c; }
        .input-group {
            margin-bottom: 15px;
        }
        label {
            display: block;
            font-size: 13px;
            margin-bottom: 5px;
            color: #888;
        }
        input, textarea {
            width: 100%;
            padding: 10px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 8px;
            color: white;
            box-sizing: border-box;
        }
        input:focus, textarea:focus {
            outline: none;
            border-color: #ff416c;
        }
        button {
            width: 100%;
            padding: 12px;
            background: #ff416c;
            border: none;
            color: white;
            font-weight: bold;
            border-radius: 8px;
            cursor: pointer;
            transition: 0.2s;
            font-size: 16px;
        }
        button:hover { background: #ff4b2b; }
        .error-msg { color: #ff4d4d; font-size: 13px; margin-top: 5px; text-align: center; }
    </style>
</head>
<body>

    <div class="form-container">
        <h2>Шинэ хаяг нээх</h2>
        <form id="registerForm">
            <div class="input-group">
                <label>Username (Жишээ нь: d3vnmd)</label>
                <input type="text" id="username" required placeholder="Зөвхөн англи үсэг, тоо">
            </div>
            <div class="input-group">
                <label>Бүтэн нэр</label>
                <input type="text" id="name" required placeholder="Таны нэр">
            </div>
            <div class="input-group">
                <label>Bio (Товч танилцуулга)</label>
                <textarea id="bio" rows="3" placeholder="Өөрийгөө товч танилцуулна уу"></textarea>
            </div>
            <div class="input-group">
                <label>Профайл зургийн линк (URL)</label>
                <input type="url" id="avatar" placeholder="https://image-link.com/avatar.jpg">
            </div>
            <div class="input-group">
                <label>Discord (Нэмэлт)</label>
                <input type="text" id="discord" placeholder="username#0000">
            </div>
            <div class="input-group">
                <label>Instagram Username (Нэмэлт)</label>
                <input type="text" id="instagram" placeholder="insta_handle">
            </div>
            <div class="input-group">
                <label>GitHub Username (Нэмэлт)</label>
                <input type="text" id="github" placeholder="github_handle">
            </div>
            <button type="submit" id="submitBtn">Хуудсаа үүсгэх</button>
            <div id="error" class="error-msg"></div>
        </form>
    </div>

    <script>
        // Өөрийн Supabase мэдээллийг энд оруулна
        const SUPABASE_URL = "https://jrzgxrptvirolfqhisqp.supabase.co";
        const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Impyemd4cnB0dmlyb2xmcWhpc3FwIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODQxMjEwODEsImV4cCI6MjA5OTY5NzA4MX0.DSFIaJ8PnmXu3PA4Y9tBT5ibGIBtA5w6f7iHmCrf86M"

        const { createClient } = supabase;
        const supabaseClient = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        document.getElementById('registerForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const submitBtn = document.getElementById('submitBtn');
            const errorDiv = document.getElementById('error');
            
            submitBtn.disabled = true;
            submitBtn.innerText = "Уншиж байна...";
            errorDiv.innerText = "";

            const username = document.getElementById('username').value.trim().toLowerCase();
            const name = document.getElementById('name').value.trim();
            const bio = document.getElementById('bio').value.trim();
            const avatar = document.getElementById('avatar').value.trim() || `https://api.dicebear.com/7.x/pixel-art/svg?seed=${username}`;
            const discord = document.getElementById('discord').value.trim();
            const instagram = document.getElementById('instagram').value.trim();
            const github = document.getElementById('github').value.trim();

            // Англи үсэг, тоо болон доогуур зураас орсон эсэхийг шалгах
            const usernameRegex = /^[a-zA-Z0-9_-]+$/;
            if (!usernameRegex.test(username)) {
                errorDiv.innerText = "Username зөвхөн англи үсэг, тоо, зураас агуулсан байх ёстой.";
                submitBtn.disabled = false;
                submitBtn.innerText = "Хуудсаа үүсгэх";
                return;
            }

            try {
                // Өгөгдлийн сан руу хадгалах
                const { error } = await supabaseClient
                    .from('profiles')
                    .insert([
                        { username, name, bio, avatar, discord, instagram, github }
                    ]);

                if (error) {
                    if (error.code === '23505') { // Postgres duplicate key error code
                        errorDiv.innerText = "Уучлаарай, энэ username аль хэдийн бүртгэгдсэн байна!";
                    } else {
                        errorDiv.innerText = "Алдаа гарлаа: " + error.message;
                    }
                } else {
                    // Амжилттай болбол шууд өөрийнх нь үүссэн хуудас руу шилжүүлнэ
                    window.location.href = `/${username}`;
                }
            } catch (err) {
                errorDiv.innerText = "Холболтын алдаа гарлаа.";
                console.error(err);
            } finally {
                submitBtn.disabled = false;
                submitBtn.innerText = "Хуудсаа үүсгэх";
            }
        });
    </script>
</body>
</html>
