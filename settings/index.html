<!DOCTYPE html>
<html lang="mn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Удирдлагын хэсэг | devnmd</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body {
            background-color: #030206; color: #fff;
            font-family: 'Segoe UI', sans-serif;
            margin: 0; display: flex; min-height: 100vh;
        }
        /* Зүүн талын Sidebar */
        .sidebar {
            width: 250px; background: #07070d;
            border-right: 1px solid rgba(0, 240, 255, 0.1);
            padding: 30px 20px; display: flex; flex-direction: column; gap: 10px;
        }
        .brand {
            font-size: 24px; font-weight: 900; color: #00f0ff;
            margin-bottom: 30px; text-shadow: 0 0 10px rgba(0,240,255,0.3);
            text-align: center;
        }
        .menu-btn {
            background: transparent; border: none; color: #8a8a9e;
            padding: 12px 15px; text-align: left; font-size: 14px;
            font-weight: 600; border-radius: 10px; cursor: pointer;
            transition: 0.2s; display: flex; align-items: center; gap: 10px;
        }
        .menu-btn:hover, .menu-btn.active {
            background: rgba(0, 240, 255, 0.05); color: #00f0ff;
        }
        /* Баруун талын Үндсэн хэсэг */
        .main-content { flex: 1; padding: 40px; overflow-y: auto; box-sizing: border-box; }
        .tab-section { display: none; }
        .tab-section.active { display: block; }
        
        /* Stats */
        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 20px; margin-bottom: 30px; }
        .stat-card {
            background: #090911; border: 1px solid rgba(255,255,255,0.05);
            border-radius: 16px; padding: 20px;
        }
        .stat-card h4 { margin: 0 0 5px 0; color: #8a8a9e; font-size: 11px; text-transform: uppercase; }
        .stat-card p { margin: 0; font-size: 24px; font-weight: 800; color: #fff; }
        .stat-card span { font-size: 11px; color: #bd00ff; }

        /* Картууд */
        .card {
            background: #090911; border: 1px solid rgba(0, 240, 255, 0.05);
            border-radius: 16px; padding: 25px; margin-bottom: 20px;
        }
        h3 { margin-top: 0; color: #00f0ff; border-bottom: 1px solid rgba(255,255,255,0.03); padding-bottom: 10px;}
        .group { margin-bottom: 15px; text-align: left;}
        label { display: block; font-size: 12px; color: #8a8a9e; margin-bottom: 6px; font-weight: bold; }
        input, textarea, select {
            width: 100%; padding: 12px; background: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(255, 255, 255, 0.05); border-radius: 10px; color: #fff; box-sizing: border-box;
        }
        input:focus, textarea:focus, select:focus { outline: none; border-color: #00f0ff; }
        button {
            background: #00f0ff; color: #000; border: none; padding: 12px 20px;
            border-radius: 10px; font-weight: bold; cursor: pointer; transition: 0.2s;
        }
        button:hover { background: #55f7ff; }
        .save-btn { width: 100%; font-size: 16px; margin-top: 10px; background: linear-gradient(45deg, #00f0ff, #bd00ff); color: white;}
        .cooldown-text { font-size: 11px; color: #ff0055; margin-top: 5px; display: block; }
        
        /* Custom Links List */
        .custom-link-item {
            background: rgba(255,255,255,0.02); border: 1px solid rgba(255,255,255,0.05);
            padding: 15px; border-radius: 10px; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center;
        }

        /* 📱 ГАР УТАСНЫ ЭРТНИЙ ТӨГС ШИЙДЭЛ (Mobile Responsive) */
        @media (max-width: 768px) {
            body { flex-direction: column; }
            .sidebar {
                width: 100%; border-right: none; border-bottom: 1px solid rgba(0, 240, 255, 0.1);
                padding: 15px; box-sizing: border-box; flex-direction: row; overflow-x: auto;
                white-space: nowrap; gap: 8px; justify-content: flex-start;
            }
            .brand { display: none; }
            .menu-btn { padding: 10px 14px; font-size: 12px; flex: 0 0 auto; }
            .main-content { padding: 20px 15px; }
            .stats-grid { gap: 15px; }
            .stat-card { padding: 15px; }
            .stat-card p { font-size: 20px; }
        }
    </style>
</head>
<body>

    <div class="sidebar">
        <div class="brand">devnmd</div>
        <button class="menu-btn active" onclick="showTab('account')">👤 Профайл</button>
        <button class="menu-btn" onclick="showTab('customize')">🎨 Загварчилгаа</button>
        <button class="menu-btn" onclick="showTab('links')">🔗 Холбоосууд</button>
        <button class="menu-btn" onclick="showTab('templates')">💎 Загварууд</button>
        <a href="#" id="my-page-btn" target="_blank" class="menu-btn" style="color:#bd00ff;">👁️ Миний хуудас</a>
        <button class="menu-btn" style="color: #ff0055;" onclick="logout()">❌ Гарах</button>
    </div>

    <div class="main-content">
        <div id="tab-account" class="tab-section active">
            <div class="stats-grid">
                <div class="stat-card">
                    <h4>Хэрэглэгч</h4>
                    <p id="stat-username">@username</p>
                    <span id="cooldown-status">Солих боломжтой</span>
                </div>
                <div class="stat-card">
                    <h4>UID</h4>
                    <p id="stat-uid">#0</p>
                    <span>Бүртгэлийн дугаар</span>
                </div>
                <div class="stat-card">
                    <h4>Нийт Лайк</h4>
                    <p id="stat-likes">0</p>
                    <span>Хуудаснаас авсан</span>
                </div>
            </div>

            <div class="card">
                <h3>Хаяг Төлөв</h3>
                <div class="group">
                    <label>Нэр солих (7 хоногт нэг удаа)</label>
                    <input type="text" id="new-username" placeholder="Шинэ нэр">
                    <span id="username-cooldown-timer" class="cooldown-text"></span>
                    <button style="margin-top:10px;" onclick="changeUsername()">Шинэчлэх</button>
                </div>
                <div class="group">
                    <label>Дэлгэцийн нэр</label>
                    <input type="text" id="profile-name">
                </div>
                <div class="group">
                    <label>Танилцуулга (Bio)</label>
                    <textarea id="profile-bio" rows="3"></textarea>
                </div>
                <div class="group">
                    <label>Профайл зураг (Avatar оруулах)</label>
                    <input type="file" id="avatar-file" accept="image/*">
                </div>
            </div>
        </div>

        <div id="tab-customize" class="tab-section">
            <div class="card">
                <h3>Арын Фон Засах</h3>
                <div class="group">
                    <label>Фон Төрөл</label>
                    <select id="bg-type" onchange="toggleBgInputs()">
                        <option value="color">Дан өнгө</option>
                        <option value="image">Зураг / GIF (Хуулах)</option>
                        <option value="video">Бичлэг (Хуулах)</option>
                    </select>
                </div>
                <div class="group" id="file-upload-group" style="display:none;">
                    <label>Файл Сонгох (GIF, Зураг, Видео)</label>
                    <input type="file" id="bg-file" accept="image/*,video/*">
                </div>
                <div class="group">
                    <label>Фоны бүрсийлт (Blur: 0px - 30px)</label>
                    <input type="range" id="bg-blur" min="0" max="30" value="10">
                </div>
                <div class="group">
                    <label>Картын тунгалаг байдал (Opacity: 10% - 100%)</label>
                    <input type="range" id="bg-opacity" min="0.1" max="1" step="0.05" value="0.6">
                </div>
            </div>

            <div class="card">
                <h3>Бичиг ба Үйлдэл</h3>
                <div class="group">
                    <label>Үсгийн Загвар (Font)</label>
                    <select id="font-family">
                        <option value="Segoe UI">Segoe UI</option>
                        <option value="Courier New">Courier New (Hacker)</option>
                        <option value="Georgia">Georgia (Classic)</option>
                        <option value="cursive">Cursive (Sakura)</option>
                    </select>
                </div>
                <div class="group">
                    <label>Хулганы заагч (Custom Cursor Линк)</label>
                    <input type="text" id="custom-cursor" placeholder="https://example.com/cursor.png">
                </div>
                <div class="group">
                    <label>Арын Хөгжим оруулах (MP3 файл)</label>
                    <input type="file" id="music-file" accept="audio/*">
                </div>
            </div>
        </div>

        <div id="tab-links" class="tab-section">
            <div class="card">
                <h3>Ухаалаг Сошиал Холбоос (Зөвхөн нэрээ бичнэ)</h3>
                <div class="group"><label>TikTok</label><input type="text" id="link-tiktok" placeholder="хэрэглэгчийн нэр"></div>
                <div class="group"><label>Instagram</label><input type="text" id="link-instagram" placeholder="хэрэглэгчийн нэр"></div>
                <div class="group"><label>GitHub</label><input type="text" id="link-github" placeholder="хэрэглэгчийн нэр"></div>
                <div class="group"><label>YouTube</label><input type="text" id="link-youtube" placeholder="@-тэй нэр"></div>
                <div class="group"><label>Steam</label><input type="text" id="link-steam" placeholder="профайл ID"></div>
                <div class="group"><label>Discord ID</label><input type="text" id="link-discord" placeholder="ID эсвэл нэр"></div>
            </div>

            <div class="card">
                <h3>Дурын холбоос нэмэх (Custom Links)</h3>
                <div style="display:flex; gap:10px; margin-bottom:15px;">
                    <input type="text" id="custom-title" placeholder="Товчны нэр">
                    <input type="text" id="custom-url" placeholder="Холбоос линк (https://...)">
                    <button onclick="addCustomLink()">Нэмэх</button>
                </div>
                <div id="custom-links-list"></div>
            </div>
        </div>

        <div id="tab-templates" class="tab-section">
            <div class="card">
                <h3>Бэлэн Загварууд</h3>
                <div style="display:flex; gap:10px; flex-wrap:wrap;">
                    <button onclick="applyTemplate('cyberpunk')" style="background:#00f0ff; color:#000;">Cyberpunk</button>
                    <button onclick="applyTemplate('obsidian')" style="background:#111; color:#fff;">Obsidian</button>
                    <button onclick="applyTemplate('sakura')" style="background:#ffb3d9; color:#000;">Sakura</button>
                </div>
            </div>

            <div class="card">
                <h3>Өөрийн загварыг хадгалах</h3>
                <div style="display:flex; gap:10px; margin-bottom:15px;">
                    <input type="text" id="template-name" placeholder="Загварын нэр">
                    <button onclick="saveCurrentAsTemplate()">💾 Загвар хадгалах</button>
                </div>
                <div id="user-templates-list"></div>
            </div>
        </div>

        <button class="save-btn" onclick="saveAllSettings()">💾 Бүх өөрчлөлтийг хадгалах</button>
        <div class="status" id="save-status"></div>
    </div>

    <script>
        const SUPABASE_URL = "https://jrzgxrptvirolfqhisqp.supabase.co";
        const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Impyemd4cnB0dmlyb2xmcWhpc3FwIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODQxMjEwODEsImV4cCI6MjA5OTY5NzA4MX0.DSFIaJ8PnmXu3PA4Y9tBT5ibGIBtA5w6f7iHmCrf86M";
        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        let sessionUser = null;
        let userProfile = null;
        let myCustomLinks = [];
        let mySavedTemplates = [];

        async function checkUser() {
            const { data: { user } } = await supabaseClient.auth.getUser();
            if (!user) {
                window.location.href = '/register';
                return;
            }
            sessionUser = user;

            const { data: profile } = await supabaseClient
                .from('profiles')
                .select('*')
                .eq('id', user.id)
                .maybeSingle();

            if (!profile) {
                window.location.href = '/username';
                return;
            }

            userProfile = profile;
            loadProfileData();
        }

        function loadProfileData() {
            document.getElementById('stat-username').innerText = `@${userProfile.username}`;
            document.getElementById('stat-uid').innerText = `#${userProfile.uid}`;
            document.getElementById('stat-likes').innerText = userProfile.likes_count || 0;
            document.getElementById('my-page-btn').href = `/${userProfile.username}`;

            checkCooldown();

            document.getElementById('profile-name').value = userProfile.name || '';
            document.getElementById('profile-bio').value = userProfile.bio || '';
            document.getElementById('bg-type').value = userProfile.bg_type || 'color';
            document.getElementById('bg-blur').value = userProfile.bg_blur || 10;
            document.getElementById('bg-opacity').value = userProfile.bg_opacity || 0.6;
            document.getElementById('font-family').value = userProfile.font_family || 'Segoe UI';
            document.getElementById('custom-cursor').value = userProfile.custom_cursor || '';

            // Сошиал унших
            const socials = userProfile.socials || {};
            document.getElementById('link-tiktok').value = socials.tiktok || '';
            document.getElementById('link-instagram').value = socials.instagram || '';
            document.getElementById('link-github').value = socials.github || '';
            document.getElementById('link-youtube').value = socials.youtube || '';
            document.getElementById('link-steam').value = socials.steam || '';
            document.getElementById('link-discord').value = socials.discord || '';

            // Custom links & Templates
            myCustomLinks = userProfile.custom_links || [];
            mySavedTemplates = userProfile.user_templates || [];
            
            renderCustomLinks();
            renderUserTemplates();
            toggleBgInputs();
        }

        function showTab(tabId) {
            document.querySelectorAll('.tab-section').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.menu-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(`tab-${tabId}`).classList.add('active');
            event.target.classList.add('active');
        }

        function toggleBgInputs() {
            const type = document.getElementById('bg-type').value;
            const uploadGroup = document.getElementById('file-upload-group');
            uploadGroup.style.display = (type === 'image' || type === 'video') ? 'block' : 'none';
        }

        function checkCooldown() {
            if (userProfile.username_last_changed) {
                const lastChanged = new Date(userProfile.username_last_changed);
                const nextAvailable = new Date(lastChanged.getTime() + 7 * 24 * 60 * 60 * 1000);
                const now = new Date();

                if (now < nextAvailable) {
                    const diffTime = Math.abs(nextAvailable - now);
                    const diffDays = Math.ceil(diffTime / (1000 * 60 * 60 * 24));
                    document.getElementById('cooldown-status').innerText = `Цоожтой (${diffDays} өдөр)`;
                    document.getElementById('cooldown-status').style.color = '#ff0055';
                }
            }
        }

        async function changeUsername() {
            const newUsername = document.getElementById('new-username').value.trim().toLowerCase();
            if (!newUsername) return;

            const regex = /^[a-zA-Z0-9_-]+$/;
            if (!regex.test(newUsername)) {
                alert("Зөвхөн англи үсэг, тоо орох боломжтой.");
                return;
            }

            const { error } = await supabaseClient
                .from('profiles')
                .update({ 
                    username: newUsername,
                    username_last_changed: new Date().toISOString()
                })
                .eq('id', sessionUser.id);

            if (error) {
                alert("Алдаа: Сонгосон нэр бүртгэлтэй эсвэл хязгаар дуусаагүй байна!");
            } else {
                alert("Username амжилттай шинэчлэгдлээ!");
                window.location.reload();
            }
        }

        // Custom Links logic
        function renderCustomLinks() {
            const list = document.getElementById('custom-links-list');
            list.innerHTML = '';
            myCustomLinks.forEach((link, idx) => {
                const div = document.createElement('div');
                div.className = 'custom-link-item';
                div.innerHTML = `
                    <div><strong>${link.title}</strong> - <span style="color:#00f0ff; font-size:12px;">${link.url}</span></div>
                    <button onclick="removeCustomLink(${idx})" style="background:#ff0055; color:#fff; padding:5px 10px; font-size:12px;">Устгах</button>
                `;
                list.appendChild(div);
            });
        }

        function addCustomLink() {
            const title = document.getElementById('custom-title').value.trim();
            const url = document.getElementById('custom-url').value.trim();
            if (!title || !url) return;

            myCustomLinks.push({ title, url });
            document.getElementById('custom-title').value = '';
            document.getElementById('custom-url').value = '';
            renderCustomLinks();
        }

        function removeCustomLink(idx) {
            myCustomLinks.splice(idx, 1);
            renderCustomLinks();
        }

        // Custom user-created templates
        function renderUserTemplates() {
            const list = document.getElementById('user-templates-list');
            list.innerHTML = '';
            mySavedTemplates.forEach((tpl, idx) => {
                const div = document.createElement('div');
                div.className = 'custom-link-item';
                div.innerHTML = `
                    <div><strong>${tpl.name}</strong></div>
                    <div>
                        <button onclick="applyUserTemplate(${idx})" style="background:#00f0ff; color:#000; padding:5px 10px; font-size:12px; margin-right:5px;">Идэвхжүүлэх</button>
                        <button onclick="removeUserTemplate(${idx})" style="background:#ff0055; color:#fff; padding:5px 10px; font-size:12px;">Устгах</button>
                    </div>
                `;
                list.appendChild(div);
            });
        }

        async function saveCurrentAsTemplate() {
            const name = document.getElementById('template-name').value.trim();
            if (!name) return;

            const currentConfig = {
                name: name,
                bg_type: document.getElementById('bg-type').value,
                bg_blur: document.getElementById('bg-blur').value,
                bg_opacity: document.getElementById('bg-opacity').value,
                font_family: document.getElementById('font-family').value,
                custom_cursor: document.getElementById('custom-cursor').value,
                background_url: userProfile.background_url,
                music_url: userProfile.music_url
            };

            mySavedTemplates.push(currentConfig);
            
            const { error } = await supabaseClient
                .from('profiles')
                .update({ user_templates: mySavedTemplates })
                .eq('id', sessionUser.id);

            if (!error) {
                alert(`"${name}" загвар амжилттай хадгалагдлаа!`);
                document.getElementById('template-name').value = '';
                renderUserTemplates();
            }
        }

        async function applyUserTemplate(idx) {
            const tpl = mySavedTemplates[idx];
            const { error } = await supabaseClient
                .from('profiles')
                .update({
                    bg_type: tpl.bg_type,
                    bg_blur: tpl.bg_blur,
                    bg_opacity: tpl.bg_opacity,
                    font_family: tpl.font_family,
                    custom_cursor: tpl.custom_cursor,
                    background_url: tpl.background_url,
                    music_url: tpl.music_url
                })
                .eq('id', sessionUser.id);

            if (!error) {
                alert(`"${tpl.name}" загвар идэвхжлээ!`);
                window.location.reload();
            }
        }

        async function removeUserTemplate(idx) {
            mySavedTemplates.splice(idx, 1);
            const { error } = await supabaseClient
                .from('profiles')
                .update({ user_templates: mySavedTemplates })
                .eq('id', sessionUser.id);
            if (!error) renderUserTemplates();
        }

        async function applyTemplate(theme) {
            let config = {};
            if (theme === 'cyberpunk') {
                config = { accent_color: '#00f0ff', text_color: '#ffffff', font_family: 'Segoe UI', bg_type: 'color', background_url: '' };
            } else if (theme === 'obsidian') {
                config = { accent_color: '#ffffff', text_color: '#a1a1b3', font_family: 'Courier New', bg_type: 'color', background_url: '' };
            } else if (theme === 'sakura') {
                config = { accent_color: '#ffb3d9', text_color: '#fff0f5', font_family: 'cursive', bg_type: 'color', background_url: '' };
            }

            const { error } = await supabaseClient.from('profiles').update(config).eq('id', sessionUser.id);
            if (!error) {
                alert("Загвар амжилттай солигдлоо!");
                window.location.reload();
            }
        }

        async function saveAllSettings() {
            const status = document.getElementById('save-status');
            status.innerText = "Хадгалж байна...";

            const name = document.getElementById('profile-name').value.trim();
            const bio = document.getElementById('profile-bio').value.trim();
            const bgType = document.getElementById('bg-type').value;
            const bgBlur = document.getElementById('bg-blur').value;
            const bgOpacity = document.getElementById('bg-opacity').value;
            const fontFamily = document.getElementById('font-family').value;
            const customCursor = document.getElementById('custom-cursor').value.trim();

            const bgFile = document.getElementById('bg-file').files[0];
            const musicFile = document.getElementById('music-file').files[0];
            const avatarFile = document.getElementById('avatar-file').files[0];

            const socials = {
                tiktok: document.getElementById('link-tiktok').value.trim(),
                instagram: document.getElementById('link-instagram').value.trim(),
                github: document.getElementById('link-github').value.trim(),
                youtube: document.getElementById('link-youtube').value.trim(),
                steam: document.getElementById('link-steam').value.trim(),
                discord: document.getElementById('link-discord').value.trim()
            };

            let backgroundUrl = userProfile.background_url;
            let musicUrl = userProfile.music_url;
            let avatarUrl = userProfile.avatar;

            try {
                if (avatarFile) {
                    const ext = avatarFile.name.split('.').pop();
                    const path = `${sessionUser.id}/avatar_${Date.now()}.${ext}`;
                    await supabaseClient.storage.from('avatars').upload(path, avatarFile, { upsert: true });
                    avatarUrl = supabaseClient.storage.from('avatars').getPublicUrl(path).data.publicUrl;
                }

                if (bgFile) {
                    const ext = bgFile.name.split('.').pop();
                    const path = `${sessionUser.id}/bg_${Date.now()}.${ext}`;
                    await supabaseClient.storage.from('avatars').upload(path, bgFile, { upsert: true });
                    backgroundUrl = supabaseClient.storage.from('avatars').getPublicUrl(path).data.publicUrl;
                }

                if (musicFile) {
                    const ext = musicFile.name.split('.').pop();
                    const path = `${sessionUser.id}/music_${Date.now()}.${ext}`;
                    await supabaseClient.storage.from('avatars').upload(path, musicFile, { upsert: true });
                    musicUrl = supabaseClient.storage.from('avatars').getPublicUrl(path).data.publicUrl;
                }

                const { error } = await supabaseClient.from('profiles').update({
                    name, bio, bg_type: bgType, bg_blur: bgBlur, bg_opacity: bgOpacity,
                    font_family: fontFamily, custom_cursor: customCursor, socials,
                    custom_links: myCustomLinks, background_url: backgroundUrl, music_url: musicUrl, avatar: avatarUrl
                }).eq('id', sessionUser.id);

                if (error) throw error;
                status.innerText = "Амжилттай хадгалагдлаа!";
                setTimeout(() => window.location.reload(), 1000);
            } catch (err) {
                status.innerText = "Алдаа: " + err.message;
            }
        }

        async function logout() {
            await supabaseClient.auth.signOut();
            window.location.href = '/register';
        }
