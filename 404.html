<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>Уншиж байна...</title>
    <script type="text/javascript">
      var path = window.location.pathname.replace(/^\/|\/$/g, '');
      // Хэрэв /register эсвэл /settings руу хандаж байвал чиглүүлэхгүй
      if (path !== 'settings' && path !== 'register') {
          window.location.replace(window.location.origin + '/?u=' + path);
      }
    </script>
  </head>

  </body>
</html>
