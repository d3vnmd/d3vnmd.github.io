<!DOCTYPE html>
<html lang="mn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Нэр олдоогүй | devnmd</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body {
            background-color: #030206; color: #ffffff;
            font-family: 'Segoe UI', sans-serif;
            display: flex; justify-content: center; align-items: center;
            min-height: 100vh; margin: 0; overflow: hidden;
        }
        body::before {
            content: ''; position: absolute; width: 450px; height: 450px;
            background: radial-gradient(circle, rgba(0, 242, 254, 0.15) 0%, rgba(0,0,0,0) 70%);
            top: -100px; left: -100px; z-index: -1;
        }
        .card {
            background: rgba(8, 7, 13, 0.8);
            border: 1px solid rgba(0, 242, 254, 0.25);
            border-radius: 28px; padding: 45px 35px;
            text-align: center; width: 100%; max-width: 420px;
            box-shadow: 0 15px 40px rgba(0,0,0,0.6), 0 0 35px rgba(0, 242, 254, 0.15);
            backdrop-filter: blur(20px);
        }
        h1 {
            font-size: 78px; margin: 0 0 10px 0; font-weight: 900;
            background: linear-gradient(45deg, #00f2fe, #9b51e0);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        }
        h2 { font-size: 22px; font-weight: 800; margin-bottom: 15px; color: #fff; }
        p { color: #8a8a9e; font-size: 14px; margin-bottom: 30px; line-height: 1.6; }
        .claim-btn {
            background: linear-gradient(135deg, #00f2fe, #9b51e0); color: #000; border: none;
            padding: 16px 28px; border-radius: 14px; font-size: 16px; font-weight: bold;
            cursor: pointer; width: 100%; transition: all 0.3s ease;
            box-shadow: 0 0 20px rgba(0, 242, 254, 0.3);
        }
        .claim-btn:hover {
            transform: translateY(-3px); box-shadow: 0 0 35px rgba(0, 242, 254, 0.6);
        }
        .claim-username-tag {
            background: rgba(255,255,255,0.03); border: 1px solid rgba(0,242,254,0.2);
            padding: 12px 24px; border-radius: 12px; font-weight: bold; color: #00f2fe;
            display: inline-block; margin-bottom: 25px; font-size: 18px;
        }
    </style>
</head>
<body>

    <div class="card" id="card-content">
        <p>Ачаалж байна...</p>
    </div>

    <script>
        const SUPABASE_URL = "https://jrzgxrptvirolfqhisqp.supabase.co";
        const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Impyemd4cnB0dmlyb2xmcWhpc3FwIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODQxMjEwODEsImV4cCI6MjA5OTY5NzA4MX0.DSFIaJ8PnmXu3PA4Y9tBT5ibGIBtA5w6f7iHmCrf86M";
        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        // REGEX CRASH FIX: Төгс ажиллах зөв regular expression бичиглэл
        let path = window.location.pathname.replace(/^\/+|\/+$/g, "").toLowerCase();

        if (path === "" || path === "settings" || path === "register" || path === "username") {
            window.location.href = "/" + path;
        } else {
            supabaseClient.from('profiles').select('username').eq('username', path).maybeSingle().then(({data, error}) => {
                if (data) {
                    window.location.href = "/?u=" + path;
                } else {
                    document.getElementById('card-content').innerHTML = `
                        <h1>404</h1>
                        <h2>Нэр олдоогүй!</h2>
                        <p>Энэ хэрэглэгчийн нэр одоогоор бүртгэгдээгүй байна. Та дараах нэрийг өөрийн болгон авахыг хүсэж байна уу?</p>
                        <div class="claim-username-tag">@${path}</div>
                        <button class="claim-btn" onclick="claimUsername('${path}')">Тийм, одоо авах!</button>
                    `;
                }
            });
        }

        function claimUsername(username) {
            localStorage.setItem('claim_username', username);
            window.location.href = `/register`;
        }
    </script>
</body>
</html>
